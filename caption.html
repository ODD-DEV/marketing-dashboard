<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODD. Content Studio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#000;--bg-raised:#1c1c1e;--bg-input:#0d0d0f;--border:rgba(255,255,255,.06);
  --t1:#f5f5f7;--t2:#d1d1d6;--t3:#a1a1a6;--t4:#6e6e73;--t5:#48484a;
  --red:#bf2026;--red-dim:rgba(191,32,38,.1);--red-border:rgba(191,32,38,.25);
  --green:#30d158;--blue:#0a84ff;--orange:#ff9f0a;--purple:#bf5af2;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --serif:'Playfair Display',Georgia,'Times New Roman',serif;
  --r:16px;--r-s:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--red);color:#fff}

/* ── Landing ── */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:0 24px;transition:all .5s cubic-bezier(.4,0,.2,1)}
.landing.pushed{justify-content:flex-start;min-height:auto;padding-top:40px}

/* Logo */
.logo-area{margin-bottom:72px;text-align:center;transition:all .4s ease}
.logo-area img{height:80px;opacity:.9;transition:all .4s ease}
.logo-area .subtitle{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--t4);margin-top:18px;letter-spacing:.3px;transition:all .3s ease}
.landing.pushed .logo-area{margin-bottom:28px}
.landing.pushed .logo-area img{height:32px}
.landing.pushed .logo-area .subtitle{opacity:0;height:0;margin:0;overflow:hidden}

/* ── Input Area ── */
.input-area{width:100%;max-width:720px}

.input-box{background:rgba(191,32,38,.08);border:1.5px solid rgba(191,32,38,.22);border-radius:28px;padding:0;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.input-box:focus-within{border-color:rgba(191,32,38,.4);background:rgba(191,32,38,.11)}
.input-box.dragover{border-color:rgba(191,32,38,.5);background:rgba(191,32,38,.14)}

.input-main{display:flex;align-items:center;gap:0;min-height:60px;padding:0 12px 0 28px}
.input-field{flex:1;position:relative;display:flex;align-items:center;min-height:60px}
.input-field textarea{width:100%;background:none;border:none;color:var(--t1);font-size:16px;line-height:1.5;font-family:var(--sans);resize:none;outline:none;padding:18px 0;min-height:24px;max-height:200px;overflow-y:auto}

/* Typing placeholder */
.input-field .typed-placeholder{position:absolute;left:0;top:50%;transform:translateY(-50%);color:var(--t5);font-size:16px;pointer-events:none;white-space:nowrap;transition:opacity .2s}
.input-field textarea:focus ~ .typed-placeholder,
.input-field textarea.has-text ~ .typed-placeholder{opacity:0}

.input-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;padding:8px 0}
.input-icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;color:var(--t4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.input-icon-btn:hover{background:rgba(255,255,255,.08);color:var(--t2)}
.input-icon-btn svg{width:20px;height:20px}
.input-icon-btn.send{background:var(--red);color:#fff}
.input-icon-btn.send:hover{background:#d4343a}
.input-icon-btn.send:disabled{background:rgba(255,255,255,.06);color:var(--t5);cursor:not-allowed}

/* File preview */
.file-preview{display:none;gap:8px;flex-wrap:wrap;padding:8px 16px 14px;border-top:1px solid var(--border)}
.file-preview.show{display:flex}
.file-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;font-size:11px;color:var(--t3)}
.file-chip .thumb{width:28px;height:28px;border-radius:6px;object-fit:cover}
.file-chip .vid-icon{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center}
.file-chip .vid-icon svg{width:14px;height:14px;fill:var(--t4)}
.file-chip .remove{width:18px;height:18px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:var(--t4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1;transition:all .15s}
.file-chip .remove:hover{background:rgba(255,255,255,.15);color:var(--t2)}

/* Drop zone overlay */
.drop-overlay{position:absolute;inset:0;background:rgba(191,32,38,.06);display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:none;opacity:0;transition:opacity .2s}
.input-box.dragover .drop-overlay{opacity:1}
.drop-overlay span{font-size:13px;color:var(--red);font-weight:600}

/* ── Options ── */
.options-bar{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:28px}

.opt-group{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.03);border-radius:100px;padding:3px;border:1px solid rgba(255,255,255,.04)}
.opt-btn{padding:6px 14px;border-radius:100px;border:none;background:transparent;color:var(--t5);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;font-family:var(--sans);white-space:nowrap}
.opt-btn:hover{color:var(--t3);background:rgba(255,255,255,.04)}
.opt-btn.active{background:rgba(255,255,255,.1);color:var(--t2);font-weight:600}
.opt-btn.active[data-val="ad"]{background:var(--red-dim);color:var(--red)}
.opt-btn.active[data-val="organic"]{background:rgba(48,209,88,.1);color:var(--green)}
.opt-btn.active[data-val="meta"]{background:rgba(79,141,249,.1);color:#4f8df9}
.opt-btn.active[data-val="tiktok"]{background:rgba(255,59,92,.1);color:#ff3b5c}
.opt-btn.active[data-val="google"]{background:rgba(52,168,83,.1);color:#34a853}
.opt-btn.active[data-val="image"]{background:rgba(255,159,10,.1);color:#ff9f0a}
.opt-btn.active[data-val="video"]{background:rgba(191,90,242,.1);color:#bf5af2}
.opt-btn.active[data-val="feed"]{background:rgba(255,159,10,.1);color:#ff9f0a}
.opt-btn.active[data-val="reels"]{background:rgba(191,90,242,.1);color:#bf5af2}
.opt-btn.active[data-val="story"]{background:rgba(79,141,249,.1);color:#4f8df9}
.opt-btn.active[data-val="carousel"]{background:rgba(56,189,248,.1);color:#38bdf8}
.opt-btn.active[data-val="1"]{background:rgba(48,209,88,.1);color:#30d158}
.opt-btn.active[data-val="2"]{background:rgba(255,159,10,.1);color:#ff9f0a}
.opt-btn.active[data-val="3"]{background:rgba(191,32,38,.15);color:var(--red)}

.opt-sep{width:1px;height:18px;background:rgba(255,255,255,.05);margin:0 2px}

.funnel-group,.format-group{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.03);border-radius:100px;padding:3px;border:1px solid rgba(255,255,255,.04);transition:all .2s}
.funnel-group.hidden,.format-group.hidden{display:none}
.f-btn,.fmt-btn{padding:5px 11px;border-radius:100px;border:none;background:transparent;color:var(--t5);cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;font-family:var(--sans)}
.f-btn:hover,.fmt-btn:hover{color:var(--t3);background:rgba(255,255,255,.04)}
.f-btn.active.tof{background:rgba(56,189,248,.1);color:#38bdf8}
.f-btn.active.mof{background:rgba(167,139,250,.1);color:#a78bfa}
.f-btn.active.bof{background:rgba(249,115,22,.1);color:#f97316}

/* History button */
.history-btn{position:fixed;top:20px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--t4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:200}
.history-btn:hover{background:rgba(255,255,255,.08);color:var(--t2)}
.history-btn svg{width:18px;height:18px}
.history-btn .badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ── Results ── */
.results-area{width:100%;max-width:720px;margin-top:48px;padding-bottom:80px;display:none}

.mode-badge{display:inline-block;font-size:11px;font-weight:600;padding:6px 12px;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:100px;margin-bottom:16px;color:var(--t3)}

.result-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:12px;position:relative;animation:fadeUp .4s ease both}
.result-card:nth-child(2){animation-delay:.08s}
.result-card:nth-child(3){animation-delay:.16s}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.result-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.result-label .dot{width:6px;height:6px;border-radius:50%}
.result-content{font-size:15px;line-height:1.8;color:var(--t2);white-space:pre-wrap;word-break:break-word}
.result-meta{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap}
.result-meta .tag{font-size:10px;padding:3px 8px;border-radius:100px;background:rgba(255,255,255,.05);color:var(--t4)}
.copy-btn{margin-left:auto;padding:6px 14px;border-radius:100px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--t4);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;gap:4px}
.copy-btn:hover{background:rgba(255,255,255,.08);color:var(--t2)}
.copy-btn svg{width:12px;height:12px;fill:currentColor}

/* Content frames for preview */
.frame-container{margin:16px 0;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.content-frame{position:relative;background:#000;border:1px solid var(--red-border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t4)}
.frame-label{position:absolute;top:8px;left:8px;font-size:9px;font-weight:600;background:rgba(0,0,0,.7);padding:3px 8px;border-radius:4px;color:var(--t4)}
.safe-zone{position:absolute;width:100%;height:15%;background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(191,32,38,.3) 2px,rgba(191,32,38,.3) 4px);border:1px dashed rgba(191,32,38,.4);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--t5)}
.safe-zone.top{top:0}
.safe-zone.bottom{bottom:0;height:20%}

.carousel-container{margin:16px 0;overflow-x:auto;padding:12px 0;scroll-snap-type:x mandatory}
.carousel-container::-webkit-scrollbar{height:4px}
.carousel-container::-webkit-scrollbar-track{background:rgba(255,255,255,.03)}
.carousel-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.slide-card{flex-shrink:0;width:180px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:12px;scroll-snap-align:start;margin-right:8px;display:flex;flex-direction:column}
.slide-num{font-size:10px;font-weight:600;color:var(--t4);margin-bottom:8px}
.slide-headline{font-family:var(--serif);font-size:12px;color:var(--t2);margin-bottom:6px;line-height:1.4;font-weight:500}
.slide-body{font-size:11px;color:var(--t3);margin-bottom:8px;line-height:1.4}
.slide-visual{font-size:9px;color:var(--t5);padding:8px;background:rgba(255,255,255,.03);border-radius:4px;border:1px solid var(--border);margin-bottom:8px}

/* Visual Recommendation Cards (inline) */
.visual-rec{margin-top:12px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--bg-input)}
.visual-rec-header{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:.8px}
.visual-rec-header svg{width:14px;height:14px;opacity:.5}
.visual-mood-row{display:flex;gap:0;overflow-x:auto;scroll-snap-type:x mandatory}
.visual-mood-row::-webkit-scrollbar{height:0}
.mood-card{flex:1;min-width:0;padding:14px;border-right:1px solid var(--border);scroll-snap-align:start;display:flex;flex-direction:column;gap:8px;transition:background .2s}
.mood-card:last-child{border-right:none}
.mood-card:hover{background:rgba(255,255,255,.02)}
.mood-thumb{width:100%;aspect-ratio:4/3;border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.mood-thumb .mood-icon{font-size:20px;opacity:.6;position:relative;z-index:1}
.mood-label{font-size:11px;font-weight:600;color:var(--t2);line-height:1.3}
.mood-desc{font-size:10px;color:var(--t4);line-height:1.4}
.mood-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.mood-tag{font-size:9px;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.04);color:var(--t5);border:1px solid rgba(255,255,255,.06)}
.visual-rec-single{padding:16px}
.visual-rec-single .mood-thumb{max-width:200px;aspect-ratio:3/4}
.visual-rec-tip{padding:10px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--t5);font-style:italic}

/* Loading */
.loading-dots{display:flex;gap:6px;align-items:center;justify-content:center;padding:40px 0}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--t5);animation:dotPulse 1.2s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── History Panel ── */
.history-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.history-overlay.open{opacity:1;pointer-events:auto}

.history-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;background:var(--bg);border-left:1px solid var(--border);z-index:301;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.history-panel.open{transform:translateX(0)}

.history-header{position:sticky;top:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:1}
.history-title{font-size:14px;font-weight:600;color:var(--t2)}
.history-close{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.history-close:hover{background:rgba(255,255,255,.1);color:var(--t1)}

.history-list{flex:1;padding:16px}
.history-empty{text-align:center;padding:60px 20px;color:var(--t5);font-size:13px}

.history-item{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-s);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.history-item:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04)}
.history-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.history-item-time{font-size:11px;color:var(--t5)}
.history-item-tags{display:flex;gap:4px}
.history-item-tags span{font-size:10px;padding:2px 8px;border-radius:100px;background:rgba(255,255,255,.05);color:var(--t4)}
.history-item-prompt{font-size:13px;color:var(--t3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.history-item-files{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.history-item-files span{font-size:10px;color:var(--t5);background:rgba(255,255,255,.03);padding:2px 6px;border-radius:4px}

/* History detail modal */
.history-detail{padding:20px 24px}
.history-detail-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t4);cursor:pointer;margin-bottom:16px;background:none;border:none;font-family:var(--sans);transition:color .15s}
.history-detail-back:hover{color:var(--t2)}
.history-detail-prompt{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:16px;padding:16px;background:rgba(255,255,255,.03);border-radius:var(--r-s);border:1px solid var(--border)}
.history-detail-result{margin-bottom:12px}
.history-detail-result .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t4);margin-bottom:6px}
.history-detail-result .content{font-size:13px;line-height:1.7;color:var(--t3);white-space:pre-wrap;word-break:break-word;padding:12px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--border)}

/* Toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-raised);border:1px solid var(--border);border-radius:100px;padding:10px 24px;color:var(--t2);font-size:13px;font-weight:500;opacity:0;transition:all .3s ease;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Mobile */
@media(max-width:600px){
  .landing{padding:0 16px}
  .landing.pushed{padding-top:28px}
  .logo-area{margin-bottom:40px}
  .logo-area img{height:52px}
  .logo-area .subtitle{font-size:13px}
  .input-main{padding:0 6px 0 16px}
  .input-field textarea{font-size:14px}
  .typed-placeholder{font-size:14px !important}
  .options-bar{gap:4px}
  .opt-btn,.f-btn,.fmt-btn{padding:5px 10px;font-size:11px}
  .result-card{padding:20px 18px}
  .history-panel{width:100vw}
  .history-btn{top:16px;right:16px}
  .frame-container{gap:8px}
  .content-frame{width:120px;height:160px}
  .carousel-container{padding:8px 0}
  .slide-card{width:140px;margin-right:6px}
}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

<!-- History Button -->
<button class="history-btn" id="historyBtn" onclick="openHistory()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
  <span class="badge" id="historyBadge" style="display:none">0</span>
</button>

<!-- History Panel -->
<div class="history-overlay" id="historyOverlay" onclick="closeHistory()"></div>
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <span class="history-title">생성 기록</span>
    <button class="history-close" onclick="closeHistory()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div id="historyContent"></div>
</div>

<div class="landing" id="landing">
  <div class="logo-area">
    <img src="odd_logo_white.png" alt="ODD.">
    <div class="subtitle">Describe your content, get perfect captions and creative concepts.</div>
  </div>

  <div class="input-area">
    <div class="input-box" id="inputBox">
      <div class="drop-overlay"><span>파일을 여기에 놓으세요</span></div>
      <div class="input-main">
        <div class="input-field">
          <textarea id="promptInput" rows="1"></textarea>
          <span class="typed-placeholder" id="typedPlaceholder"></span>
        </div>
        <div class="input-actions">
          <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none">
          <button class="input-icon-btn" onclick="document.getElementById('fileInput').click()" title="파일 첨부">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="input-icon-btn send" id="sendBtn" onclick="generate()" disabled title="생성">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>

// ⛔ 금지 표현 목록
const BANNED = [
  'one bottle salad','the one bottle salad','2 second salad','2-second salad',

// 가이드라인 체크 — 생성된 카피가 Meta/TikTok 정책을 위반하지 않는지 검증
function guidelineCheck(text) {
  const warnings = [];
  const lower = text.toLowerCase();
  BANNED.forEach(b => { if (lower.includes(b.toLowerCase())) warnings.push('⛔ 금지 표현 포함: "' + b + '"'); });
  const healthDirect = [/your blood sugar/i,/당신의 혈당/,/혈당이 높으/,/are you struggling/i,/your metabolism is broken/i,/당신의 소화가 문제/];
  healthDirect.forEach(r => { if (r.test(text)) warnings.push('⚠️ 개인 건강 직접 언급 — Meta 정책 위반 가능'); });
  const medClaims = [/clinically proven/i,/guaranteed result/i,/instant relief/i,/cures /i,/치료/,/완치/,/예방해/];
  medClaims.forEach(r => { if (r.test(text)) warnings.push('⚠️ 의약품 수준 주장 — 플랫폼 정책 위반'); });
  const negSelf = [/still suffering/i,/고통받/,/still struggling/i,/지쳐있/,/망가진 몸/];
  negSelf.forEach(r => { if (r.test(text)) warnings.push('⚠️ 부정적 자기 인식 유도 — 긍정적 프레이밍으로 전환 필요'); });
  const weight = [/lose \d+ pound/i,/kg 빠/,/fat burner/i,/체지방 감소/,/appetite suppressant/i,/detox/i];
  weight.forEach(r => { if (r.test(text)) warnings.push('⚠️ 체중 관련 주장 — TikTok/Meta 정책 위반'); });
  return warnings;
}

// ── Smart Mode Detection ──
function detectMode(prompt) {
  const lower = prompt.toLowerCase();
  const captionKeywords = ['캡션','caption','문구','카피','copy','글','써줘','write'];
  const contentKeywords = ['콘텐츠','content','추천','recommend','만들어','create','에셋','asset','소재','제작'];

  const hasCaption = captionKeywords.some(k => lower.includes(k));
  const hasContent = contentKeywords.some(k => lower.includes(k));

  if (hasContent && !hasCaption) return 'content';
  if (hasCaption && !hasContent) return 'caption';
  if (hasCaption && hasContent) return 'hybrid';
  return null;
}

// ── ODD. 해시태그 ──
const ODD_HASHTAGS = {
  fixed: ['#oddtobewell'],
  campaign: ['#notsaladbutsalad'],
  salad: ['#saladbowl','#saladrecipe','#saladlife','#saladbowl'],
  lifestyle: ['#dailyroutine','#everydaywellness','#premeal'],
  metabolic: ['#MetabolicHealth','#BloodSugar','#GlucoseControl'],
  wellness: ['#WellnessRitual','#IntentionalLiving']
};

function oddHashtags(ch, isAd, contentTheme) {
  if (ch === 'google') return '';
  const tags = [...ODD_HASHTAGS.fixed];
  if (isAd || contentTheme === 'campaign') tags.push(...ODD_HASHTAGS.campaign);
  const pool = contentTheme === 'education'
    ? [...ODD_HASHTAGS.metabolic, ...ODD_HASHTAGS.wellness]
    : [...ODD_HASHTAGS.salad.slice(0,2), ...ODD_HASHTAGS.lifestyle.slice(0,1)];
  tags.push(...pool);
  const max = ch === 'tiktok' ? 5 : 5;
  return [...new Set(tags)].slice(0, max).join(' ');
}

const MOOD_GRADIENTS = [
  'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)',

  'linear-gradient(135deg,#1a0a0a,#2d1f1f,#1a1a1a)',

];
const MOOD_ICONS = ['📸','🎬','🖼️','🎨','✨'];

function generateVisualRec(keywords, visualDesc) {
  const moodCards = keywords.map((kw, i) => {
    const grad = MOOD_GRADIENTS[i % MOOD_GRADIENTS.length];
    const icon = MOOD_ICONS[i % MOOD_ICONS.length];
    const tags = kw.split(' ').filter(t => t.length > 2).slice(0, 3);
    return '<div class="mood-card">' +
      '<div class="mood-thumb" style="background:' + grad + '"><span class="mood-icon">' + icon + '</span></div>' +
      '<div class="mood-label">' + esc(kw) + '</div>' +
      '<div class="mood-tags">' + tags.map(t => '<span class="mood-tag">' + esc(t) + '</span>').join('') + '</div>' +
    '</div>';
  });

  let html = '<div class="visual-rec">';
  html += '<div class="visual-rec-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>추천 비주얼 방향</div>';
  html += '<div class="visual-mood-row">' + moodCards.join('') + '</div>';
  if (visualDesc) {
    html += '<div class="visual-rec-tip">' + esc(visualDesc) + '</div>';
  }
  html += '</div>';
  return html;
}

function generateStockLinks(keywords) {

const phrases = [
  '콘텐츠 주제를 설명해주세요...',
  '어떤 메시지를 전달하고 싶나요?',
  '이미지나 영상을 드래그하세요',

];
let phraseIdx = 0, charIdx = 0, isDeleting = false, typingTimer = null;
const phEl = document.getElementById('typedPlaceholder');

function typeLoop() {
  const phrase = phrases[phraseIdx];
  if (!isDeleting) {
    phEl.textContent = phrase.slice(0, charIdx + 1);
    charIdx++;
    if (charIdx >= phrase.length) {
      isDeleting = true;
      typingTimer = setTimeout(typeLoop, 2200);
      return;
    }
    typingTimer = setTimeout(typeLoop, 60);
  } else {
    phEl.textContent = phrase.slice(0, charIdx);
    charIdx--;
    if (charIdx < 0) {
      isDeleting = false;
      charIdx = 0;
      phraseIdx = (phraseIdx + 1) % phrases.length;
      typingTimer = setTimeout(typeLoop, 400);
      return;
    }
    typingTimer = setTimeout(typeLoop, 30);
  }
}

    files.push(f);

function getDashboardSummary(prompt) {
  if (typeof EMBEDDED_DATA === 'undefined') return null;
  const d = EMBEDDED_DATA;
  const lower = prompt.toLowerCase();

  // 월 감지
  const monthMatch = prompt.match(/(\d{1,2})월/);
  const targetMonth = monthMatch ? parseInt(monthMatch[1]) : new Date().getMonth() + 1;
  const targetYear = 2026; // data.js 기준

  const orders = (d.orders || []).filter(o => {
    const od = new Date(o.d);
    return od.getMonth() + 1 === targetMonth && od.getFullYear() === targetYear && o.s === 'sale';
  });

  const totalRevenue = orders.reduce((sum, o) => sum + (o.t || 0), 0);
  const totalOrders = orders.length;
  const byChannel = {};
  orders.forEach(o => {
    const ch = o.ch || 'unknown';
    if (!byChannel[ch]) byChannel[ch] = { count: 0, revenue: 0 };
    byChannel[ch].count++;
    byChannel[ch].revenue += (o.t || 0);
  });

  let md = '**' + targetMonth + '월 매출 현황**\n\n';
  md += '| 항목 | 값 |\n|---|---|\n';
  md += '| 총 주문 수 | ' + totalOrders + '건 |\n';
  md += '| 총 매출 | $' + totalRevenue.toLocaleString('en-US', {minimumFractionDigits:0}) + ' |\n';
  md += '| 평균 주문가 | $' + (totalOrders ? (totalRevenue / totalOrders).toFixed(0) : 0) + ' |\n\n';

  md += '**채널별 매출:**\n\n| 채널 | 주문 | 매출 |\n|---|---|---|\n';
  for (const [ch, v] of Object.entries(byChannel)) {
    md += '| ' + ch + ' | ' + v.count + '건 | $' + v.revenue.toLocaleString('en-US', {minimumFractionDigits:0}) + ' |\n';
  }

  // 구독 현황
  if (d.recharge_active) {
    md += '\n**활성 구독:** ' + d.recharge_active.length + '명';
  }
  // 재고
  if (d.inventory) {
    md += '\n\n**재고:**\n';
    d.inventory.forEach(item => {
      md += '- ' + item.name + ': ' + item.on_hand + '개\n';
    });
  }

  return md;
}

function isDriveSearchQuery(text) {
  const actionKw = ['찾아','검색해','보여줘','보여줄래','드라이브','파일좀','이미지좀','영상좀'];
  const hasAction = actionKw.some(k => text.includes(k));
  if (!hasAction) return false;
  const assetKw = ['사진','이미지','영상','에셋','파일','콘텐츠','소스','원본','드라이브'];
  const questionKw = ['뭐야','뭔가','무엇','어떤','알려줘','설명해','왜','어떻게','뭐지'];
  const isQuestion = questionKw.some(k => text.includes(k));
  if (isQuestion && !assetKw.some(k => text.includes(k))) return false;
  return true;
}

function isAssetRecommendQuery(text) {
  const lower = text.toLowerCase();
  const recKw = ['추천','제안','골라','suggest','recommend'];
  const assetKw = ['이미지','사진','영상','비주얼','에셋','asset','visual','photo','image','video'];
  return recKw.some(k => lower.includes(k)) && assetKw.some(k => lower.includes(k));
}

function isBuiltInQuery(text) {
  const lower = text.toLowerCase();
  const infoKw = ['원료','성분','ingredient','가격','price','제품','product','사용법','복용','먹는법'];
  const questionKw = ['뭐야','뭔가','무엇','알려줘','설명해','어떤','어떻게','뭐지'];
  return infoKw.some(k => lower.includes(k)) && questionKw.some(k => lower.includes(k));
}

function detectIntents(prompt) {
  const intents = [];
  const lower = prompt.toLowerCase();

  // Data/dashboard intent (매출, 주문, 재고 등)
  if (isDataQuery(prompt)) intents.push('data');

  // Info intent (원료, 성분, 제품 설명 등)
  const infoKw = ['원료','성분','ingredient','설명해','제품','효과','효능','사용법'];
  if (infoKw.some(k => lower.includes(k)) && !isDataQuery(prompt)) intents.push('info');

  // Caption intent (캡션, 카피, 문구, 글귀 등)

    ]);

    if (driveRes.length) {
      html += '<div class="result-card"><div class="result-label"><span class="dot" style="background:var(--green)"></span>Drive 에셋 추천</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:12px">';
      driveRes.slice(0,12).forEach(f => {
        const thumb = f.thumbnailLink ? f.thumbnailLink.replace('=s220','=s400') : '';
        html += '<div style="border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;background:var(--bg-raised)" onclick="window.open(\'https://drive.google.com/file/d/'+f.id+'/view\',\'_blank\')">'+(thumb?'<img src="'+thumb+'" style="width:100%;aspect-ratio:1;object-fit:cover;display:block" loading="lazy">':'<div style="width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;color:var(--t5);font-size:10px">미리보기 없음</div>')+'<div style="padding:4px 6px;font-size:9px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(f.name)+'</div></div>';
      });
      html += '</div></div>';
    }

    if (unsplashRes.length) {
      html += '<div class="result-card"><div class="result-label"><span class="dot" style="background:var(--blue)"></span>Unsplash 스톡 추천</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:12px">';
      unsplashRes.forEach(p => {
        html += '<div style="border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;background:var(--bg-raised)" onclick="window.open(\''+p.link+'?utm_source=odd_ai\',\'_blank\')"><img src="'+p.url+'" style="width:100%;aspect-ratio:1;object-fit:cover;display:block" loading="lazy"><div style="padding:4px 6px;font-size:9px;color:var(--t5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">by '+esc(p.credit)+'</div></div>';
      });
      html += '</div><div style="margin-top:6px;font-size:10px;color:var(--t5)">Unsplash — free to use</div></div>';
    }
  }

  if (!html) html = '<div class="result-card"><div class="result-content">결과를 생성하지 못했습니다.</div></div>';
  ra.innerHTML = html;
  saveHistory(prompt, [{ label: '처리 (' + intents.join('+') + ')', content: prompt }]);
}

// ── Generate (Smart Router) ──
const _origGenerate = function() {
  const prompt = promptInput.value.trim();
  if (!prompt && files.length === 0) return;

  document.getElementById('landing').classList.add('pushed');
  const ra = document.getElementById('resultsArea');
  ra.style.display = 'block';
  ra.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  const detectedMode = detectMode(prompt);
  state.detectedMode = detectedMode;

  const channels = state.channel === 'all' ? ['meta'] : [state.channel];

  setTimeout(() => {
    const allResults = [];

    if (detectedMode === 'content' || detectedMode === 'hybrid') {
      const contentResults = buildContentResults(prompt);
      allResults.push(...contentResults);
    }

    if (!detectedMode || detectedMode === 'caption' || detectedMode === 'hybrid') {
      channels.forEach(ch => {
        const captionResults = buildCaptions(prompt, ch);
        allResults.push(...captionResults);
      });
    }

    renderResults(allResults, detectedMode);
    saveHistory(prompt, allResults);
  }, 800);
};

function generate() {
  const prompt = promptInput.value.trim();
  if (!prompt && files.length === 0) return;

  const intents = detectIntents(prompt);

  // 데이터/정보/에셋/드라이브 질의 → 멀티인텐트 엔진
  if (intents.length > 0 && !(intents.length === 1 && intents[0] === 'caption')) {
    handleMultiIntent(prompt, intents);
    return;
  }

  // 복잡한 분석 질의 → AI
  if (shouldUseAI(prompt) && !intents.length) {
    generateWithAI(prompt);
    return;
  }

  // 기본 캡션 생성
  _origGenerate();
}

function buildContentResults(prompt) {
  const results = [];
  const fn = state.funnel;
  const fmt = state.contentFormat;

  const formatInfo = {
    feed: { size:'1080×1440', ratio:'3:4', slides:1 },
    reels: { size:'1080×1920', ratio:'9:16', slides:1 },
    story: { size:'1080×1920', ratio:'9:16', slides:1 },
    carousel: { size:'1080×1350', ratio:'4:5', slides:3 }
  };

  const info = formatInfo[fmt];
  const modeLabel = { tof:'TOF', mof:'MOF', bof:'BOF' }[fn];

  // Content Overview Card
  results.push({
    label: '📋 콘텐츠 개요',
    content: '포맷: ' + fmt.charAt(0).toUpperCase() + fmt.slice(1) + '\n크기: ' + info.size + ' (' + info.ratio + ')\n슬라이드: ' + info.slides + '개\n펀넬: ' + modeLabel,
    color: '#38bdf8',
    tags: ['콘텐츠 모드', fmt],
    isOverview: true
  });

  // Content Frames
  let frameContent = '추천 안전 영역:\n\n';
  if (fmt === 'feed') {
    frameContent += renderContentFrame('Feed', 200, 267);
  } else if (fmt === 'reels' || fmt === 'story') {
    frameContent += renderContentFrame(fmt === 'reels' ? 'Reels' : 'Story', 120, 160);
  } else if (fmt === 'carousel') {
    frameContent += renderContentFrame('Carousel', 200, 250);
  }

  results.push({
    label: '🎨 프레임 & 안전 영역',
    content: frameContent,
    color: '#a78bfa',
    tags: ['프레임 가이드', fmt],
    isFrame: true
  });

  // Carousel Slides (if carousel format)
  if (fmt === 'carousel') {
    const slides = generateCarouselSlides(prompt, fn, state.tension);
    let carouselHtml = '<div class="carousel-container">';
    slides.forEach(s => {
      const grad = MOOD_GRADIENTS[s.num % MOOD_GRADIENTS.length];
      const icon = MOOD_ICONS[s.num % MOOD_ICONS.length];
      carouselHtml += '<div class="slide-card">' +
        '<div class="mood-thumb" style="background:' + grad + ';aspect-ratio:4/5;border-radius:6px;margin-bottom:10px;display:flex;align-items:center;justify-content:center"><span style="font-size:24px;opacity:.5">' + icon + '</span></div>' +
        '<div class="slide-num">슬라이드 ' + s.num + '</div>' +
        '<div class="slide-headline">' + esc(s.headline) + '</div>' +
        '<div class="slide-body">' + esc(s.body) + '</div>' +
        '<div class="slide-visual">' + esc(s.visual) + '</div>' +
        '</div>';
    });
    carouselHtml += '</div>';

    results.push({
      label: '📸 캐러셀 슬라이드',
      content: carouselHtml,
      color: '#38bdf8',
      tags: ['캐러셀', '5슬라이드'],
      isCarousel: true,
      htmlContent: true
    });
  } else {
    // Single slide for other formats
    const visualDir = '다크 톤 음식 포토 / M-01 병 중앙 배치 / 미니멀 타이포그래피 / 세련된 라이프스타일';
    const stockKeywords = ['dark food photography','minimal wellness product','health supplement bottle'];
    let slideContent = generateVisualRec(stockKeywords, visualDir);

    results.push({
      label: '📸 콘텐츠 구성',
      content: slideContent,
      color: '#38bdf8',
      tags: ['비주얼 가이드', fmt],
      htmlContent: true
    });
  }

  // Auto-generated caption for content mode
  const caption = oddAdCaption(prompt, 'meta', fn, state.tension);
  results.push({
    label: '📝 캡션',
    content: caption.text,
    color: '#ff9f0a',
    tags: ['자동생성', modeLabel],
    channel: 'meta'
  });

  return results;
}

function buildCaptions(prompt, ch) {
  const isAd = state.type === 'ad';
  const fn = state.funnel;
  const tension = state.tension;
  const results = [];
  const chLabel = { meta: 'Meta', tiktok: 'TikTok', google: 'Google' }[ch];
  const chColor = { meta: '#4f8df9', tiktok: '#ff3b5c', google: '#34a853' }[ch];
  const fnColor = { tof: '#38bdf8', mof: '#a78bfa', bof: '#f97316' }[fn];
  const tensionLabel = { '1': 'Safe Bold', '2': 'Provocative', '3': 'Max Edge' }[tension];

  const caption = isAd ? oddAdCaption(prompt, ch, fn, tension) : oddOrganicCaption(prompt, ch, tension);
  const prefix = state.channel === 'all' ? chLabel + ' ' : '';

  const warnings = guidelineCheck(caption.text);
  const captionContent = warnings.length
    ? caption.text + '\n\n' + '─'.repeat(30) + '\n⚠️ 가이드라인 체크:\n' + warnings.join('\n')
    : caption.text;

  results.push({
    label: prefix + '캡션' + (isAd ? ' [' + fn.toUpperCase() + ']' : ''),
    content: captionContent,
    color: isAd ? fnColor : chColor,
    tags: [...caption.tags, tensionLabel],
    channel: ch
  });

  if (isAd) {
    const cta = oddCTA(ch, fn);
    results.push({ label: prefix + 'CTA', content: cta.text, color: chColor, tags: cta.tags, channel: ch });
  }

  if (ch !== 'google') {
    const theme = isAd ? 'campaign' : 'lifestyle';
    const ht = oddHashtags(ch, isAd, theme);
    results.push({ label: prefix + '해시태그', content: ht, color: 'var(--t4)', channel: ch });
  }

  return results;
}

// ── Render Results ──
function renderResults(results, detectedMode) {
  const area = document.getElementById('resultsArea');
  let html = '';

  // Mode badge
  if (detectedMode) {
    const badgeText = detectedMode === 'content' ? '🎨 콘텐츠 모드' : detectedMode === 'caption' ? '📝 캡션 모드' : '📝+🎨 통합 모드';
    html += '<div class="mode-badge">' + badgeText + '</div>';
  }

  html += results.map((r, i) => {
    if (r.htmlContent) {
      return '<div class="result-card" style="animation-delay:' + (i * .06) + 's">' +
        '<div class="result-label" style="color:' + r.color + '"><span class="dot" style="background:' + r.color + '"></span>' + esc(r.label) + '</div>' +
        '<div class="result-content" style="white-space:normal">' + r.content + '</div>' +
        '<div class="result-meta">' +
          (r.tags ? r.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('') : '') +
        '</div></div>';
    } else {
      const encoded = encodeURIComponent(r.content);
      return '<div class="result-card" style="animation-delay:' + (i * .06) + 's">' +
        '<div class="result-label" style="color:' + r.color + '"><span class="dot" style="background:' + r.color + '"></span>' + esc(r.label) + '</div>' +
        '<div class="result-content">' + esc(r.content) + '</div>' +
        '<div class="result-meta">' +
          (r.tags ? r.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('') : '') +
          '<button class="copy-btn" onclick="copyText(this,\'' + encoded + '\')"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>복사</button>' +
        '</div></div>';
    }
  }).join('');

  area.innerHTML = html;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyText(btn, encoded) {
  navigator.clipboard.writeText(decodeURIComponent(encoded)).then(() => {
    showToast('복사되었습니다');
    btn.textContent = '✓';
    setTimeout(() => { btn.innerHTML = '<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>복사'; }, 1500);
  });
}

// ── History (localStorage) ──
function getHistory() {
  try { return JSON.parse(localStorage.getItem('odd_caption_history') || '[]'); } catch { return []; }
}
function saveHistory(prompt, results) {
  const history = getHistory();
  history.unshift({
    id: Date.now(),
    time: new Date().toISOString(),
    prompt: prompt,
    files: files.map(f => ({ name: f.name, type: f.type })),
    settings: { ...state },
    results: results.map(r => ({ label: r.label, content: r.content }))
  });
  if (history.length > 100) history.length = 100;
  localStorage.setItem('odd_caption_history', JSON.stringify(history));
  updateBadge();
}

function updateBadge() {
  const count = getHistory().length;
  const badge = document.getElementById('historyBadge');
  if (count > 0) { badge.style.display = ''; badge.textContent = count > 99 ? '99+' : count; }
  else badge.style.display = 'none';
}

function openHistory() {
  document.getElementById('historyOverlay').classList.add('open');
  document.getElementById('historyPanel').classList.add('open');
  renderHistoryList();
}
function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
  document.getElementById('historyPanel').classList.remove('open');
}

function renderHistoryList() {
  const history = getHistory();
  const container = document.getElementById('historyContent');
  if (!history.length) {
    container.innerHTML = '<div class="history-empty">아직 생성 기록이 없습니다.</div>';
    return;
  }
  const typeLabel = { ad: '광고', organic: '일반' };
  const chLabel = { all: '통합', meta: 'Meta', tiktok: 'TikTok', google: 'Google' };
  const fnLabel = { tof: 'TOF', mof: 'MOF', bof: 'BOF' };

  container.innerHTML = '<div class="history-list">' + history.map((h, i) => {
    const d = new Date(h.time);
    const timeStr = d.getMonth() + 1 + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    const s = h.settings;
    let tagsHtml = '<span>' + (typeLabel[s.type] || s.type) + '</span><span>' + (chLabel[s.channel] || s.channel) + '</span>';
    if (s.type === 'ad') tagsHtml += '<span>' + (fnLabel[s.funnel] || '') + '</span>';
    const filesHtml = h.files.length ? '<div class="history-item-files">' + h.files.map(f => '<span>' + esc(f.name) + '</span>').join('') + '</div>' : '';
    return '<div class="history-item" onclick="showHistoryDetail(' + i + ')">' +
      '<div class="history-item-header"><div class="history-item-tags">' + tagsHtml + '</div><span class="history-item-time">' + timeStr + '</span></div>' +
      '<div class="history-item-prompt">' + esc(h.prompt || '(파일만 첨부)') + '</div>' +
      filesHtml + '</div>';
  }).join('') + '</div>';
}

function showHistoryDetail(idx) {
  const history = getHistory();
  const h = history[idx];
  if (!h) return;
  const container = document.getElementById('historyContent');
  const d = new Date(h.time);
  const timeStr = d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');

  let html = '<div class="history-detail">';
  html += '<button class="history-detail-back" onclick="renderHistoryList()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> 목록으로</button>';
  html += '<div style="font-size:11px;color:var(--t5);margin-bottom:12px">' + timeStr + '</div>';
  if (h.files.length) {
    html += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">' + h.files.map(f => '<span style="font-size:10px;color:var(--t4);background:rgba(255,255,255,.05);padding:3px 8px;border-radius:6px">' + esc(f.name) + '</span>').join('') + '</div>';
  }
  html += '<div class="history-detail-prompt">' + esc(h.prompt || '(파일만 첨부)') + '</div>';
  h.results.forEach(r => {
    html += '<div class="history-detail-result"><div class="label">' + esc(r.label) + '</div><div class="content">' + esc(r.content) + '</div></div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init
updateBadge();
</script>

</html>
