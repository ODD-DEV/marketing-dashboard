<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODD. Content Studio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#000;--bg-raised:#1c1c1e;--bg-input:#0d0d0f;--border:rgba(255,255,255,.06);
  --t1:#f5f5f7;--t2:#d1d1d6;--t3:#a1a1a6;--t4:#6e6e73;--t5:#48484a;
  --red:#bf2026;--red-dim:rgba(191,32,38,.1);--red-border:rgba(191,32,38,.25);
  --green:#30d158;--blue:#0a84ff;--orange:#ff9f0a;--purple:#bf5af2;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --serif:'Playfair Display',Georgia,'Times New Roman',serif;
  --r:16px;--r-s:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--red);color:#fff}

/* ── Landing ── */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:0 24px;transition:all .5s cubic-bezier(.4,0,.2,1)}
.landing.pushed{justify-content:flex-start;min-height:auto;padding-top:40px}

/* Logo */
.logo-area{margin-bottom:72px;text-align:center;transition:all .4s ease}
.logo-area img{height:80px;opacity:.9;transition:all .4s ease}
.logo-area .subtitle{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--t4);margin-top:18px;letter-spacing:.3px;transition:all .3s ease}
.landing.pushed .logo-area{margin-bottom:28px}
.landing.pushed .logo-area img{height:32px}
.landing.pushed .logo-area .subtitle{opacity:0;height:0;margin:0;overflow:hidden}

/* ── Input Area ── */
.input-area{width:100%;max-width:720px}

.input-box{background:rgba(191,32,38,.08);border:1.5px solid rgba(191,32,38,.22);border-radius:28px;padding:0;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.input-box:focus-within{border-color:rgba(191,32,38,.4);background:rgba(191,32,38,.11)}
.input-box.dragover{border-color:rgba(191,32,38,.5);background:rgba(191,32,38,.14)}

.input-main{display:flex;align-items:center;gap:0;min-height:60px;padding:0 12px 0 28px}
.input-field{flex:1;position:relative;display:flex;align-items:center;min-height:60px}
.input-field textarea{width:100%;background:none;border:none;color:var(--t1);font-size:16px;line-height:1.5;font-family:var(--sans);resize:none;outline:none;padding:18px 0;min-height:24px;max-height:200px;overflow-y:auto}

/* Typing placeholder */
.input-field .typed-placeholder{position:absolute;left:0;top:50%;transform:translateY(-50%);color:var(--t5);font-size:16px;pointer-events:none;white-space:nowrap;transition:opacity .2s}
.input-field textarea:focus ~ .typed-placeholder,
.input-field textarea.has-text ~ .typed-placeholder{opacity:0}

.input-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;padding:8px 0}
.input-icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:transparent;color:var(--t4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.input-icon-btn:hover{background:rgba(255,255,255,.08);color:var(--t2)}
.input-icon-btn svg{width:20px;height:20px}
.input-icon-btn.send{background:var(--red);color:#fff}
.input-icon-btn.send:hover{background:#d4343a}
.input-icon-btn.send:disabled{background:rgba(255,255,255,.06);color:var(--t5);cursor:not-allowed}

/* File preview */
.file-preview{display:none;gap:8px;flex-wrap:wrap;padding:8px 16px 14px;border-top:1px solid var(--border)}
.file-preview.show{display:flex}
.file-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;font-size:11px;color:var(--t3)}
.file-chip .thumb{width:28px;height:28px;border-radius:6px;object-fit:cover}
.file-chip .vid-icon{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center}
.file-chip .vid-icon svg{width:14px;height:14px;fill:var(--t4)}
.file-chip .remove{width:18px;height:18px;border-radius:50%;border:none;background:rgba(255,255,255,.08);color:var(--t4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1;transition:all .15s}
.file-chip .remove:hover{background:rgba(255,255,255,.15);color:var(--t2)}

/* Drop zone overlay */
.drop-overlay{position:absolute;inset:0;background:rgba(191,32,38,.06);display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:none;opacity:0;transition:opacity .2s}
.input-box.dragover .drop-overlay{opacity:1}
.drop-overlay span{font-size:13px;color:var(--red);font-weight:600}

/* ── Options ── */
.options-bar{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:28px}

.opt-group{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.03);border-radius:100px;padding:3px;border:1px solid rgba(255,255,255,.04)}
.opt-btn{padding:6px 14px;border-radius:100px;border:none;background:transparent;color:var(--t5);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;font-family:var(--sans);white-space:nowrap}
.opt-btn:hover{color:var(--t3);background:rgba(255,255,255,.04)}
.opt-btn.active{background:rgba(255,255,255,.1);color:var(--t2);font-weight:600}
.opt-btn.active[data-val="ad"]{background:var(--red-dim);color:var(--red)}
.opt-btn.active[data-val="organic"]{background:rgba(48,209,88,.1);color:var(--green)}
.opt-btn.active[data-val="meta"]{background:rgba(79,141,249,.1);color:#4f8df9}
.opt-btn.active[data-val="tiktok"]{background:rgba(255,59,92,.1);color:#ff3b5c}
.opt-btn.active[data-val="google"]{background:rgba(52,168,83,.1);color:#34a853}
.opt-btn.active[data-val="image"]{background:rgba(255,159,10,.1);color:#ff9f0a}
.opt-btn.active[data-val="video"]{background:rgba(191,90,242,.1);color:#bf5af2}
.opt-btn.active[data-val="feed"]{background:rgba(255,159,10,.1);color:#ff9f0a}
.opt-btn.active[data-val="reels"]{background:rgba(191,90,242,.1);color:#bf5af2}
.opt-btn.active[data-val="story"]{background:rgba(79,141,249,.1);color:#4f8df9}
.opt-btn.active[data-val="carousel"]{background:rgba(56,189,248,.1);color:#38bdf8}
.opt-btn.active[data-val="1"]{background:rgba(48,209,88,.1);color:#30d158}
.opt-btn.active[data-val="2"]{background:rgba(255,159,10,.1);color:#ff9f0a}
.opt-btn.active[data-val="3"]{background:rgba(191,32,38,.15);color:var(--red)}

.opt-sep{width:1px;height:18px;background:rgba(255,255,255,.05);margin:0 2px}

.funnel-group,.format-group{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.03);border-radius:100px;padding:3px;border:1px solid rgba(255,255,255,.04);transition:all .2s}
.funnel-group.hidden,.format-group.hidden{display:none}
.f-btn,.fmt-btn{padding:5px 11px;border-radius:100px;border:none;background:transparent;color:var(--t5);cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;font-family:var(--sans)}
.f-btn:hover,.fmt-btn:hover{color:var(--t3);background:rgba(255,255,255,.04)}
.f-btn.active.tof{background:rgba(56,189,248,.1);color:#38bdf8}
.f-btn.active.mof{background:rgba(167,139,250,.1);color:#a78bfa}
.f-btn.active.bof{background:rgba(249,115,22,.1);color:#f97316}

/* Account status — avatar only */
.account-status{position:fixed;top:20px;right:72px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.04);cursor:pointer;transition:all .2s;z-index:200;user-select:none;display:flex;align-items:center;justify-content:center;overflow:hidden}
.account-status:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.account-status.logged-in{border-color:rgba(48,209,88,.25);background:rgba(48,209,88,.06)}
.account-status.logged-in:hover{background:rgba(48,209,88,.1)}
.account-avatar{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.account-avatar svg{width:18px;height:18px;color:var(--t4)}
.account-avatar img{width:100%;height:100%;object-fit:cover}

/* History button */
.history-btn{position:fixed;top:20px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--t4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:200}
.history-btn:hover{background:rgba(255,255,255,.08);color:var(--t2)}
.history-btn svg{width:18px;height:18px}
.history-btn .badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ── Results ── */
.results-area{width:100%;max-width:720px;margin-top:48px;padding-bottom:80px;display:none}

.mode-badge{display:inline-block;font-size:11px;font-weight:600;padding:6px 12px;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:100px;margin-bottom:16px;color:var(--t3)}

.result-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r);padding:28px 28px 24px;margin-bottom:12px;position:relative;animation:fadeUp .5s ease both}
.result-card:nth-child(2){animation-delay:.08s}
.result-card:nth-child(3){animation-delay:.16s}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.result-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.result-label .dot{width:6px;height:6px;border-radius:50%}
.result-content{font-size:15px;line-height:1.8;color:var(--t2);word-break:break-word;overflow-wrap:break-word;overflow-x:hidden}
.result-meta{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap}
.result-meta .tag{font-size:10px;padding:3px 8px;border-radius:100px;background:rgba(255,255,255,.05);color:var(--t4)}
.copy-btn{margin-left:auto;padding:6px 14px;border-radius:100px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--t4);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;gap:4px}
.copy-btn:hover{background:rgba(255,255,255,.08);color:var(--t2)}
.copy-btn svg{width:12px;height:12px;fill:currentColor}

/* Content frames for preview */
.frame-container{margin:16px 0;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.content-frame{position:relative;background:#000;border:1px solid var(--red-border);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--t4)}
.frame-label{position:absolute;top:8px;left:8px;font-size:9px;font-weight:600;background:rgba(0,0,0,.7);padding:3px 8px;border-radius:4px;color:var(--t4)}
.safe-zone{position:absolute;width:100%;height:15%;background:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(191,32,38,.3) 2px,rgba(191,32,38,.3) 4px);border:1px dashed rgba(191,32,38,.4);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--t5)}
.safe-zone.top{top:0}
.safe-zone.bottom{bottom:0;height:20%}

.carousel-container{margin:16px 0;overflow-x:auto;padding:12px 0;scroll-snap-type:x mandatory}
.carousel-container::-webkit-scrollbar{height:4px}
.carousel-container::-webkit-scrollbar-track{background:rgba(255,255,255,.03)}
.carousel-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.slide-card{flex-shrink:0;width:180px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:12px;scroll-snap-align:start;margin-right:8px;display:flex;flex-direction:column}
.slide-num{font-size:10px;font-weight:600;color:var(--t4);margin-bottom:8px}
.slide-headline{font-family:var(--serif);font-size:12px;color:var(--t2);margin-bottom:6px;line-height:1.4;font-weight:500}
.slide-body{font-size:11px;color:var(--t3);margin-bottom:8px;line-height:1.4}
.slide-visual{font-size:9px;color:var(--t5);padding:8px;background:rgba(255,255,255,.03);border-radius:4px;border:1px solid var(--border);margin-bottom:8px}

/* Visual Recommendation Cards (inline) */
.visual-rec{margin-top:12px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--bg-input)}
.visual-rec-header{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:.8px}
.visual-rec-header svg{width:14px;height:14px;opacity:.5}
.visual-mood-row{display:flex;gap:0;overflow-x:auto;scroll-snap-type:x mandatory}
.visual-mood-row::-webkit-scrollbar{height:0}
.mood-card{flex:1;min-width:0;padding:14px;border-right:1px solid var(--border);scroll-snap-align:start;display:flex;flex-direction:column;gap:8px;transition:background .2s}
.mood-card:last-child{border-right:none}
.mood-card:hover{background:rgba(255,255,255,.02)}
.mood-thumb{width:100%;aspect-ratio:4/3;border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.mood-thumb .mood-icon{font-size:20px;opacity:.6;position:relative;z-index:1}
.mood-label{font-size:11px;font-weight:600;color:var(--t2);line-height:1.3}
.mood-desc{font-size:10px;color:var(--t4);line-height:1.4}
.mood-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.mood-tag{font-size:9px;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.04);color:var(--t5);border:1px solid rgba(255,255,255,.06)}
.visual-rec-single{padding:16px}
.visual-rec-single .mood-thumb{max-width:200px;aspect-ratio:3/4}
.visual-rec-tip{padding:10px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--t5);font-style:italic}

/* Loading */
.loading-dots{display:flex;gap:6px;align-items:center;justify-content:center;padding:40px 0}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--t5);animation:dotPulse 1.2s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── AI Response Rendered Content ── */
.result-content h1{font-size:22px;font-weight:700;margin:20px 0 12px;color:var(--t1);letter-spacing:-.3px}
.result-content h2{font-size:18px;font-weight:600;margin:18px 0 10px;color:var(--t1);letter-spacing:-.2px}
.result-content h3{font-size:15px;font-weight:600;margin:14px 0 8px;color:var(--t2)}
.result-content h1:first-child,.result-content h2:first-child,.result-content h3:first-child{margin-top:0}
.result-content p{margin:0 0 10px;line-height:1.8}
.result-content p:last-child{margin-bottom:0}
.result-content ul,.result-content ol{margin:8px 0 12px 0;padding-left:20px}
.result-content li{margin-bottom:4px;line-height:1.7;color:var(--t2)}
.result-content li::marker{color:var(--t4)}
.result-content strong{color:var(--t1);font-weight:600}
.result-content em{color:var(--t3);font-style:italic}
.result-content hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.result-content blockquote{margin:10px 0;padding:10px 16px;border-left:3px solid var(--t5);color:var(--t3);font-size:14px;background:rgba(255,255,255,.02);border-radius:0 8px 8px 0}
.result-content pre{margin:10px 0;padding:14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;overflow-x:auto;font-size:13px;line-height:1.6}
.result-content code{font-family:'SF Mono',Menlo,Monaco,monospace;font-size:.9em}

/* Tables */
.result-content table{width:100%;border-collapse:separate;border-spacing:0;margin:12px 0;border-radius:10px;overflow:hidden;border:1px solid var(--border);font-size:14px}
.result-content thead{background:rgba(255,255,255,.06)}
.result-content th{text-align:left;padding:10px 14px;font-weight:600;color:var(--t2);font-size:13px;letter-spacing:.3px;border-bottom:1px solid var(--border)}
.result-content td{padding:9px 14px;color:var(--t3);border-bottom:1px solid rgba(255,255,255,.03)}
.result-content tbody tr:last-child td{border-bottom:none}
.result-content tbody tr:hover{background:rgba(255,255,255,.02)}

/* Korean reference box */
.ko-ref-box{margin-top:20px;padding:16px 18px;background:rgba(96,165,250,.04);border:1px solid rgba(96,165,250,.12);border-radius:12px;border-left:3px solid #60a5fa}
.ko-ref-box .ko-ref-title{font-size:12px;font-weight:600;color:#60a5fa;margin-bottom:10px;letter-spacing:.5px}
.ko-ref-box .ko-ref-body{font-size:13px;line-height:1.8;color:var(--t3)}

/* Streaming text — clean monospace-ish feel during stream */
.result-content.streaming{white-space:pre-wrap !important;line-height:1.9;font-size:14.5px;color:var(--t2)}
.result-content.streaming::after{content:'';display:inline-block;width:2px;height:1em;background:var(--purple);margin-left:1px;vertical-align:text-bottom;border-radius:1px;animation:cursorBlink .8s ease-in-out infinite}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:.15}}

/* Final rendered content — smooth crossfade */
.result-content.rendered{animation:renderFade .5s ease both}
@keyframes renderFade{from{opacity:.5;filter:blur(1px)}to{opacity:1;filter:blur(0)}}

/* ── History Panel ── */
.history-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.history-overlay.open{opacity:1;pointer-events:auto}

.history-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;background:var(--bg);border-left:1px solid var(--border);z-index:301;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.history-panel.open{transform:translateX(0)}

.history-header{position:sticky;top:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:1}
.history-title{font-size:14px;font-weight:600;color:var(--t2)}
.history-close{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.06);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.history-close:hover{background:rgba(255,255,255,.1);color:var(--t1)}

.history-list{flex:1;padding:16px}
.history-empty{text-align:center;padding:60px 20px;color:var(--t5);font-size:13px}

.history-item{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r-s);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.history-item:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04)}
.history-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.history-item-time{font-size:11px;color:var(--t5)}
.history-item-tags{display:flex;gap:4px}
.history-item-tags span{font-size:10px;padding:2px 8px;border-radius:100px;background:rgba(255,255,255,.05);color:var(--t4)}
.history-item-prompt{font-size:13px;color:var(--t3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.history-item-files{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.history-item-files span{font-size:10px;color:var(--t5);background:rgba(255,255,255,.03);padding:2px 6px;border-radius:4px}

/* History detail modal */
.history-detail{padding:20px 24px}
.history-detail-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t4);cursor:pointer;margin-bottom:16px;background:none;border:none;font-family:var(--sans);transition:color .15s}
.history-detail-back:hover{color:var(--t2)}
.history-detail-prompt{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:16px;padding:16px;background:rgba(255,255,255,.03);border-radius:var(--r-s);border:1px solid var(--border)}
.history-detail-result{margin-bottom:12px}

<script>
// ── State ──
const state = { type:'ad', channel:'all', format:'image', funnel:'tof', tension:'1', contentFormat:'feed', detectedMode:null };
const files = [];

// ══════════════════════════════════════════════════════════
// ODD. BRAND SKILL ENGINE — SKILL.md 기반 캡션 생성 로직
// ══════════════════════════════════════════════════════════

// ⛔ 금지 표현 목록
const BANNED = [
  'one bottle salad','the one bottle salad','2 second salad','2-second salad',
  'just 2 seconds','the best 2-second change','in 2 seconds','ready in 2 seconds'
];

// 가이드라인 체크 — 생성된 카피가 Meta/TikTok 정책을 위반하지 않는지 검증
function guidelineCheck(text) {
  const warnings = [];
  const lower = text.toLowerCase();

  // 1) ODD 자체 금지 표현
  BANNED.forEach(b => { if (lower.includes(b.toLowerCase())) warnings.push('⛔ 금지 표현 포함: "' + b + '"'); });

  // 2) META — 개인 건강 속성 직접 언급 금지 (Personal Attributes Policy)
  // "you/your" + 건강 상태 조합 = 광고 거부 사유
  const personalHealth = [
    /your blood sugar/i, /your metabolism/i, /your digestion/i, /your gut/i, /your body is/i,
    /are you struggling/i, /are you tired of/i, /do you suffer/i, /is your health/i,
    /당신의 혈당/, /당신의 소화/, /당신의 몸/, /당신의 건강/, /혈당이 높으/
  ];
  personalHealth.forEach(r => { if (r.test(text)) warnings.push('⚠️ [Meta] 개인 건강 속성 직접 언급 — Personal Attributes Policy 위반'); });

  // 3) META + TIKTOK — 의약품 수준 주장 금지 (Disease Claims)
  const diseaseClaims = [
    /clinically proven/i, /scientifically proven/i, /medically proven/i,
    /guaranteed result/i, /instant relief/i, /immediate result/i,
    /cures? /i, /treats? /i, /prevents? disease/i, /eliminates? /i, /fixes? /i,
    /치료/, /완치/, /예방해/, /없앤/, /고친/
  ];
  diseaseClaims.forEach(r => { if (r.test(text)) warnings.push('⚠️ [Meta+TikTok] 의약품 수준 질병 주장 — 광고 거부/계정 정지 위험'); });

  // 4) META + TIKTOK — 부정적 자기 인식 / 수치심 유도 금지
  const negSelf = [
    /still suffering/i, /still struggling/i, /sick and tired/i, /broken body/i,
    /damaged metabolism/i, /failing health/i, /your body is failing/i,
    /고통받/, /지쳐있/, /망가진 몸/, /병든/, /고장난/
  ];
  negSelf.forEach(r => { if (r.test(text)) warnings.push('⚠️ [Meta+TikTok] 부정적 자기 인식 유도 — 긍정적 프레이밍으로 전환 필요'); });

  // 5) TIKTOK — 체중/다이어트 관련 완전 금지 (Prohibited Category)
  const weightBanned = [
    /lose \d+ pound/i, /lose weight/i, /weight loss/i, /burn fat/i, /fat burner/i,
    /appetite suppress/i, /slim down/i, /shed pound/i, /melt fat/i,
    /kg 빠/, /체지방 감소/, /살 빠/, /다이어트/, /체중 감량/, /식욕 억제/
  ];
  weightBanned.forEach(r => { if (r.test(text)) warnings.push('⛔ [TikTok] 체중/다이어트 주장 — TikTok 완전 금지 카테고리'); });

  // 6) TIKTOK — Before/After 변환 금지
  const beforeAfter = [/before and after/i, /before\/after/i, /전후 비교/, /비포.*애프터/, /변화 사진/];
  beforeAfter.forEach(r => { if (r.test(text)) warnings.push('⚠️ [TikTok] Before/After 변환 콘텐츠 — TikTok 금지'); });

  // 7) META — 과장된 약속 / 비현실적 결과
  const exaggerated = [
    /100% guaranteed/i, /miracle/i, /magic pill/i, /overnight result/i,
    /in just \d+ day/i, /transform your body/i,
    /기적/, /마법/, /하룻밤/, /즉각적/
  ];
  exaggerated.forEach(r => { if (r.test(text)) warnings.push('⚠️ [Meta] 과장된 결과 약속 — 광고 거부 사유'); });

  // 8) META+TIKTOK — 위험 키워드 자동 플래그
  const flaggedTerms = [
    /testosterone/i, /ephedra/i, /steroid/i, /hormone therapy/i, /insulin inject/i,
    /테스토스테론/, /스테로이드/, /호르몬 치료/
  ];
  flaggedTerms.forEach(r => { if (r.test(text)) warnings.push('⚠️ [Meta+TikTok] 자동 플래그 위험 키워드 포함'); });

  // 9) FDA — Structure/Function 미준수 (disclaimer 누락 체크)
  const clinicalStats = /\d+%\s*(reduce|lower|increase|decrease|감소|증가|완화)/i;
  if (clinicalStats.test(text) && !/individual results may vary/i.test(text) && !/개인차/i.test(text)) {
    warnings.push('⚠️ [FDA] 임상 수치 사용 시 "Individual results may vary" disclaimer 필요');
  }

  return warnings;
}

// ── Smart Mode Detection ──
function detectMode(prompt) {
  const lower = prompt.toLowerCase();
  const captionKeywords = ['캡션','caption','문구','카피','copy','글','써줘','write'];
  const contentKeywords = ['콘텐츠','content','추천','recommend','만들어','create','에셋','asset','소재','제작'];

  const hasCaption = captionKeywords.some(k => lower.includes(k));
  const hasContent = contentKeywords.some(k => lower.includes(k));

  if (hasContent && !hasCaption) return 'content';
  if (hasCaption && !hasContent) return 'caption';
  if (hasCaption && hasContent) return 'hybrid';
  return null;
}

// ── ODD. 해시태그 ──
const ODD_HASHTAGS = {
  fixed: ['#oddtobewell'],
  campaign: ['#notsaladbutsalad'],
  salad: ['#saladbowl','#saladrecipe','#saladlife','#saladbowl'],
  lifestyle: ['#dailyroutine','#everydaywellness','#premeal'],
  metabolic: ['#MetabolicHealth','#BloodSugar','#GlucoseControl'],
  wellness: ['#WellnessRitual','#IntentionalLiving']
};

function oddHashtags(ch, isAd, contentTheme) {
  if (ch === 'google') return '';
  const tags = [...ODD_HASHTAGS.fixed];
  if (isAd || contentTheme === 'campaign') tags.push(...ODD_HASHTAGS.campaign);
  const pool = contentTheme === 'education'
    ? [...ODD_HASHTAGS.metabolic, ...ODD_HASHTAGS.wellness]
    : [...ODD_HASHTAGS.salad.slice(0,2), ...ODD_HASHTAGS.lifestyle.slice(0,1)];
  tags.push(...pool);
  const max = ch === 'tiktok' ? 5 : 5;
  return [...new Set(tags)].slice(0, max).join(' ');
}

// ── ODD. AI 캡션 생성 엔진 ──
const CAPTION_SYSTEM = `You are ODD.'s dedicated copywriter. Write ACTUAL ready-to-post captions — never briefs, never templates.

BRAND: ODD. — premium US dietary supplement. Product: M-01, pre-meal liquid supplement (twist-and-drink, lemon flavor).
TAGLINE: "Not Salad, But Salad." / "Original Design Decoded"
PHILOSOPHY: "We return wellness to its original design." / "Don't blame sugar — we changed its form."
WEBSITE: odd.us / m-01.odd.us
PROOF: 4.8-star rating, 100+ customers, 60-day money-back guarantee, free shipping.

5 KEY INGREDIENTS (use these FACTS in educational content):
- Delphinol® (Maqui Berry, Patagonia — 56% reduced insulin response within 60min)
- Reducose® (White Mulberry Leaf, ~5x DNJ — 42% lower blood sugar response, 44% less carb impact)
- GOFOS™ (Short-Chain FOS prebiotic — feeds beneficial gut bacteria, supports GLP-1)
- Orafti® GR (Chicory Root Inulin, Belgium — 25% increase in beneficial gut bacteria)
- Lalmin® C2000 (Organic Chromium, Estonia — supports cellular glucose uptake)

REAL CUSTOMER VOICES (for social proof captions):
- "Less bloated and less tempted to snack after meals"
- "Game changer. Great taste and easy to use"
- "Energy feels more steady, especially after meals"
- "Smoother digestion with fewer post-meal crashes"

TONE (inspiration, NEVER copy verbatim):
- Confident not aggressive. Sophisticated yet warm. Science-informed not heavy.
- 설명하지 않고 선언한다. 가르치지 않고 보여준다.
- Philosophical, not fear-based. Questions > Education > Solutions.
- Keywords: ritual, intention, rhythm, original design, decode
- NEVER fear/shame/negative self-image. Always positive framing.

PROVEN CREATIVE PATTERNS (from best-performing Meta ads — use as tone reference):
- Metaphor hooks: "The missing piece to your wellness puzzle 🧩" / "Make your routine first-class ✈️" / "AirDrop: M-01 wants to share a healthier routine 📲"
- Enhancement angle: "M-01 isn't about replacing real food. It's about making your routine cleaner, faster, and undeniably more efficient."
- Soft CTA style: "Complete your day with ODD M-01" / "Accept the benefits without the bowl" / "Reclaim your time. Reclaim your energy."
- Line breaks between thoughts (breathing room). 4-6 short lines per block.
- Emoji: 1-2 per paragraph, contextual not decorative. (🧩✨⚡️✈️📲💼🌍)
- Video/carousel > static image. Metaphor-driven hooks > direct product shots.

FUNNEL CONTEXT:

function buildCaptionPrompt(userPrompt, ch, fn, tension, isAd) {
  const chSpec = {
    meta: 'Instagram/Facebook Feed — refined tone, breathing room, max 5 hashtags',
    tiktok: 'TikTok — short & punchy, 2-5 lines, consider text overlay',
    google: 'Google Ads RSA — 3 headlines (30 chars) + 2 descriptions (90 chars)'
  }[ch] || 'Instagram Feed';
  const fnSpec = {
    tof: 'TOF (Awareness) — scroll-stopping hook',
    mof: 'MOF (Consideration) — educational, ingredients/science/differentiation, depth',
    bof: 'BOF (Conversion) — offer, guarantee, urgency, CTA'
  }[fn] || 'TOF';
  const tSpec = { '1':'Safe Bold — 절제된 자신감', '2':'Provocative — 도발적 질문', '3':'Max Edge — 서사적/시적' }[tension] || 'Safe Bold';
  const typeSpec = isAd ? '광고 캡션' : '오가닉(비광고) — 커뮤니티 대화 톤';
  return userPrompt + '\n\n---\n채널: ' + chSpec + '\n펀넬: ' + fnSpec + '\n톤: ' + tSpec + '\n유형: ' + typeSpec;
}

async function generateCaptionWithAI(prompt, ch, fn, tension, isAd, streamTarget) {
  const key = aiConfig.key;
  if (!key) return { text: '⚠️ 캡션 생성을 위해 설정(⚙️)에서 AI API 키를 입력하세요.', tags: ['API 키 필요'] };
  const chLabel = { meta:'Meta', tiktok:'TikTok', google:'Google Ads' }[ch] || ch;
  const fnLabel = { tof:'TOF', mof:'MOF', bof:'BOF' }[fn] || fn;
  const tLabel = { '1':'Safe Bold', '2':'Provocative', '3':'Max Edge' }[tension] || '';
  const tags = [isAd ? '광고' : '오가닉', chLabel, fnLabel, tLabel];

  try {
    const r = await fetch(AI_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key },
      body: JSON.stringify({
        model: 'claude-opus-4-6', max_tokens: 2048, stream: true,
        system: CAPTION_SYSTEM,
        messages: [{ role: 'user', content: buildCaptionPrompt(prompt, ch, fn, tension, isAd) }]
      })
    });

    if (!r.body) {
      const data = await r.json();
      const text = (data.content && data.content[0] && data.content[0].text) || '캡션을 생성하지 못했습니다.';
      return { text, tags };
    }

    // 스트리밍 처리 — 플레인텍스트 후 마크다운 전환
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    if (streamTarget) {
      streamTarget.classList.add('streaming');
      streamTarget.textContent = '';

      let textDirty = false;
      function flushCaption() {
        if (!textDirty) return;
        textDirty = false;
        streamTarget.textContent = fullText;
      }
      let animId;
      function animLoop() { flushCaption(); animId = requestAnimationFrame(animLoop); }
      animId = requestAnimationFrame(animLoop);

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const jsonStr = line.slice(6).trim();
          if (jsonStr === '[DONE]') continue;
          try {
            const evt = JSON.parse(jsonStr);
            if (evt.type === 'content_block_delta' && evt.delta && evt.delta.text) {
              fullText += evt.delta.text;
              textDirty = true;
            }
          } catch {}
        }
      }

      cancelAnimationFrame(animId);
      flushCaption();
      streamTarget.classList.remove('streaming');
      streamTarget.classList.add('rendered');
      streamTarget.innerHTML = renderBuiltInMd(fullText || '캡션을 생성하지 못했습니다.');
    } else {
      // streamTarget 없는 경우 — 텍스트만 수집
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const jsonStr = line.slice(6).trim();
          if (jsonStr === '[DONE]') continue;
          try {
            const evt = JSON.parse(jsonStr);
            if (evt.type === 'content_block_delta' && evt.delta && evt.delta.text) {
              fullText += evt.delta.text;
            }
          } catch {}
        }
      }
    }
    return { text: fullText || '캡션을 생성하지 못했습니다.', tags };
  } catch (e) {
    return { text: 'AI 오류: ' + e.message, tags: ['오류'] };
  }
}

const phrases = [
  '콘텐츠 주제를 설명해주세요...',
  '어떤 메시지를 전달하고 싶나요?',

  '예: M-01 성분 교육 캐러셀'
];
let phraseIdx = 0, charIdx = 0, isDeleting = false, typingTimer = null;
const phEl = document.getElementById('typedPlaceholder');

function typeLoop() {
  const phrase = phrases[phraseIdx];
  if (!isDeleting) {
    phEl.textContent = phrase.slice(0, charIdx + 1);
    charIdx++;
    if (charIdx >= phrase.length) {
      isDeleting = true;
      typingTimer = setTimeout(typeLoop, 2200);
      return;
    }
    typingTimer = setTimeout(typeLoop, 60);
  } else {
    phEl.textContent = phrase.slice(0, charIdx);
    charIdx--;
    if (charIdx < 0) {
      isDeleting = false;
      charIdx = 0;
      phraseIdx = (phraseIdx + 1) % phrases.length;
      typingTimer = setTimeout(typeLoop, 400);
      return;
    }
    typingTimer = setTimeout(typeLoop, 30);
  }
}
typeLoop();

function addFiles(fileList) {
  Array.from(fileList).forEach(f => {
    if (files.length >= 5) return;
    if (!f.type.startsWith('image/') && !f.type.startsWith('video/')) return;
    files.push(f);
  });
  renderFiles();
  sendBtn.disabled = !promptInput.value.trim() && files.length === 0;
}

function renderFiles() {
  const c = document.getElementById('filePreview');
  if (!files.length) { c.classList.remove('show'); return; }
  c.classList.add('show');
  c.innerHTML = files.map((f, i) => {
    const isImg = f.type.startsWith('image/');
    const thumb = isImg
      ? '<img class="thumb" src="' + URL.createObjectURL(f) + '">'
      : '<div class="vid-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>';
    const name = f.name.length > 18 ? f.name.slice(0, 16) + '…' : f.name;
    return '<span class="file-chip">' + thumb + '<span>' + name + '</span><button class="remove" onclick="removeFile(' + i + ')">✕</button></span>';
  }).join('');
}

function removeFile(i) {

function getBuiltInAnswer(text) {

function renderBuiltInMd(text) {
  // Split Korean reference section into separate box
  let main = text, koRef = '';
  const koSplit = text.split(/---\s*\n?\s*🇰🇷\s*한글\s*참고\s*:?\s*/);
  if (koSplit.length > 1) { main = koSplit[0].trim(); koRef = koSplit[1].trim(); }

  let h = main.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Tables
  h = h.replace(/((?:^\|.+\|$\n?)+)/gm, function(block) {
    const rows = block.trim().split('\n').filter(r => r.trim());
    if (rows.length < 2) return block;
    let table = '<table>';
    rows.forEach((row, i) => {
      const cells = row.split('|').filter(c => c.trim() !== '');
      if (i === 1 && /^[\s\-:]+$/.test(cells.join(''))) return;
      const tag = i === 0 ? 'th' : 'td';
      if (i === 0) table += '<thead>';
      if (i === 2) table += '<tbody>';
      table += '<tr>' + cells.map(c => '<' + tag + '>' + c.trim() + '</' + tag + '>').join('') + '</tr>';
      if (i === 0) table += '</thead>';
    });
    table += '</tbody></table>';
    return table;
  });
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => '<pre><code>' + c.trim() + '</code></pre>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(?<!\*)\*([^\*\n]+?)\*(?!\*)/g, '<em>$1</em>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/^---+$/gm, '<hr>');
  // Blockquotes (> escaped to &gt;)
  h = h.replace(/((?:^&gt;\s?.*$\n?)+)/gm, function(block) {
    const inner = block.replace(/^&gt;\s?/gm, '').trim();
    return '<blockquote>' + inner + '</blockquote>';
  });
  h = h.replace(/^- (.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  h = h.replace(/\n{2,}/g, '</p><p>');
  h = h.replace(/\n/g, '<br>');
  h = '<p>' + h + '</p>';
  h = h.replace(/<p><(h[1-3]|pre|ul|ol|table|hr)/g, '<$1');
  h = h.replace(/<\/(h[1-3]|pre|ul|ol|table)><\/p>/g, '</$1>');
  h = h.replace(/<p><\/p>/g, '');
  // Dollar highlight
  h = h.replace(/\$([\d,]+\.?\d*)/g, '<strong style="color:#4ade80">$$1</strong>');

  // Korean reference box
  if (koRef) {
    let kr = koRef.replace(/^>\s?/gm, '');
    kr = kr.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    kr = kr.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    kr = kr.replace(/\n{2,}/g, '</p><p>');
    kr = kr.replace(/\n/g, '<br>');
    h += '<div class="ko-ref-box"><div class="ko-ref-title">🇰🇷 한글 참고</div><div class="ko-ref-body">' + kr + '</div></div>';
  }

  return h;
}

// 스마트 검색어 확장: 사용자 쿼리 → 실제 Drive 파일명에 맞는 검색어들
function expandSearchTerms(query) {
  const lower = query.toLowerCase();
  const expanded = new Set();
  for (const [, map] of Object.entries(ODD_KNOWLEDGE_MAP)) {
    if (map.triggers.some(t => lower.includes(t))) {
      map.terms.forEach(t => expanded.add(t));
    }
  }
  // 확장 결과가 없으면 원본 쿼리 사용
  if (expanded.size === 0) {
    // 한글 → 영어 기본 변환
    const koEnMap = {'사진':'photo','이미지':'image','영상':'video','원료':'ingredient','건강':'health','식전':'pre-meal'};
    let q = query;
    for (const [ko, en] of Object.entries(koEnMap)) { q = q.replace(new RegExp(ko, 'g'), en); }
    expanded.add(q.trim());
  }
  return [...expanded];
}

    // 하위 폴더도 탐색 (depth 1)
    if ((maxDepth || 1) > 0) {
      const subFolders = allF.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
      const subResults = await Promise.all(subFolders.map(sf => listFolderAll(sf.id, 0)));
      subResults.forEach(sr => mediaFiles.push(...sr));
    }
    return mediaFiles;
  }

  const searches = [];

  // 헬퍼: allDrives → 일반 검색 fallback
  async function driveSearch(qStr) {
    const files = [];
    try {
      const eq = encodeURIComponent(qStr);
      // 1차: allDrives (shared drive 포함)
      let url = 'https://www.googleapis.com/drive/v3/files?q=' + eq +
        '&fields=files(id,name,mimeType,thumbnailLink,webViewLink)&pageSize=100' +
        '&supportsAllDrives=true&includeItemsFromAllDrives=true&corpora=allDrives';
      let r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + driveAccessToken } });
      if (!r.ok) {
        // 2차: supportsAllDrives만 (corpora 없이 — 내 드라이브 + 공유됨)
        url = 'https://www.googleapis.com/drive/v3/files?q=' + eq +
          '&fields=files(id,name,mimeType,thumbnailLink,webViewLink)&pageSize=100' +
          '&supportsAllDrives=true&includeItemsFromAllDrives=true';
        r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + driveAccessToken } });
      }
      if (r.ok) { const d = await r.json(); files.push(...(d.files || [])); }
    } catch {}
    return files;
  }

  // 1) 검색어 기반 검색 (이름, pageSize=100)
  terms.slice(0, 10).forEach(term => {
    const escaped = term.replace(/'/g, "\\'");
    const mimeFilter = "(mimeType contains 'image/' or mimeType contains 'video/' or mimeType = 'application/pdf')";
    searches.push(driveSearch(mimeFilter + " and name contains '" + escaped + "'"));
  });

  // 2) 광고 소재 폴더 전체 (광고 관련 쿼리)
  if (isAdQuery) {
    searches.push(listFolderAll(DRIVE_AD_CREATIVE_FOLDER, 1));
  }

  // 3) 패키지 칼선 폴더 전체 (하위 폴더 포함)
  if (isPackagingQuery) {
    searches.push(listFolderAll(DRIVE_PACKAGING_FOLDER, 2));
  }

  // 4) ODD/M-01 포괄 쿼리 → 주요 폴더 전체 나열 + 광고/패키지 폴더도 포함
  if (isOddBroadQuery) {
    for (const fid of DRIVE_FOLDER_IDS) {
      searches.push(listFolderAll(fid, 1));
    }
    searches.push(listFolderAll(DRIVE_AD_CREATIVE_FOLDER, 1));
  }

  // 5) 기본 ODD / M-01 검색어 항상 추가 (놓치는 파일 방지)
  const mimeAll = "(mimeType contains 'image/' or mimeType contains 'video/' or mimeType = 'application/pdf')";
  ['ODD', 'M-01', 'M01'].forEach(baseT => {
    if (!terms.includes(baseT)) {
      searches.push(driveSearch(mimeAll + " and name contains '" + baseT + "'"));
    }
  });

  const results = await Promise.all(searches);
  results.forEach(files => {
    files.forEach(f => {
      if (!seen.has(f.id)) { seen.add(f.id); allFiles.push(f); }
    });
  });

  return allFiles;
}

let NOTION_KEY = localStorage.getItem('odd_notion_key') || '';
let notionCache = { pages: [], texts: [], lastFetch: 0 };

async function fetchNotionPages() {
  if (Date.now() - notionCache.lastFetch < 10 * 60 * 1000 && notionCache.pages.length) return notionCache;
  try {
    const r = await fetch(AI_PROXY + '/notion/search', {
      method: 'POST',
      headers: { 'x-notion-key': NOTION_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_size: 100 })
    });
    const data = await r.json();
    notionCache.pages = (data.results || []).map(p => {
      let title = '';
      if (p.object === 'page') {
        const props = p.properties || {};
        for (const v of Object.values(props)) {
          if (v.type === 'title' && v.title) { title = v.title.map(t => t.plain_text).join(''); break; }
        }
      } else if (p.object === 'database') {
        title = (p.title || []).map(t => t.plain_text).join('');
      }
      return { id: p.id, title, type: p.object, url: p.url };
    }).filter(p => p.title);
    notionCache.lastFetch = Date.now();
  } catch (e) { console.warn('Notion fetch error', e); }
  return notionCache;
}

async function fetchNotionPageContent(pageId) {
  try {
    const r = await fetch(AI_PROXY + '/notion/blocks/' + pageId + '/children?page_size=100', {
      headers: { 'x-notion-key': NOTION_KEY }
    });
    const data = await r.json();
    let text = '';
    for (const block of (data.results || [])) {
      const rt = block[block.type];
      if (rt && rt.rich_text) {
        text += rt.rich_text.map(t => t.plain_text).join('') + '\n';
      } else if (block.type === 'child_page') {
        text += '[하위페이지: ' + (block.child_page?.title || '') + ']\n';
      } else if (block.type === 'child_database') {
        text += '[하위DB: ' + (block.child_database?.title || '') + ']\n';
      }
    }
    return text.trim();
  } catch (e) { return ''; }
}

async function searchNotion(query) {
  await fetchNotionPages();
  const lower = query.toLowerCase();
  // 불용어 제거 — 검색에 의미 없는 단어
  const stopWords = ['찾아줘','찾아','검색','알려줘','알려','설명해줘','설명해','보여줘','보여','해줘','해','줘','좀','우리','뭐야','사진','이미지','영상','파일','자료','정보','관련','에셋','의','을','를','이','가','은','는','에','도','로','와','과','한','인','된','하는','대한'];
  const terms = lower.split(/\s+/).filter(t => t.length > 1 && !stopWords.includes(t));

  // 제목 매칭 — ODD 관련 우선
  const matched = notionCache.pages.filter(p => {
    const t = p.title.toLowerCase();
    return terms.some(term => t.includes(term));
  }).sort((a, b) => {
    // ODD/M-01 관련 페이지 우선
    const aOdd = /odd|m-01|m01/i.test(a.title) ? 1 : 0;
    const bOdd = /odd|m-01|m01/i.test(b.title) ? 1 : 0;
    return bOdd - aOdd;
  }).slice(0, 5);

  // 매칭된 페이지의 본문도 가져오기 (최대 3개, 병렬)
  const withContent = await Promise.all(matched.slice(0, 3).map(async p => {
    const content = await fetchNotionPageContent(p.id);
    return { ...p, content };
  }));

  return { matched, withContent };
}

function getDashboardSummary(prompt) {
  if (typeof EMBEDDED_DATA === 'undefined') return null;
  const d = EMBEDDED_DATA;
  const lower = prompt.toLowerCase();

  // 월 감지
  const monthMatch = prompt.match(/(\d{1,2})월/);
  const targetMonth = monthMatch ? parseInt(monthMatch[1]) : new Date().getMonth() + 1;
  const targetYear = 2026; // data.js 기준

  const orders = (d.orders || []).filter(o => {
    const od = new Date(o.d);
    return od.getMonth() + 1 === targetMonth && od.getFullYear() === targetYear && o.s === 'sale';
  });

  const totalRevenue = orders.reduce((sum, o) => sum + (o.t || 0), 0);
  const totalOrders = orders.length;
  const byChannel = {};
  orders.forEach(o => {
    const ch = o.ch || 'unknown';
    if (!byChannel[ch]) byChannel[ch] = { count: 0, revenue: 0 };
    byChannel[ch].count++;
    byChannel[ch].revenue += (o.t || 0);
  });

  let md = '**' + targetMonth + '월 매출 현황**\n\n';
  md += '| 항목 | 값 |\n|---|---|\n';
  md += '| 총 주문 수 | ' + totalOrders + '건 |\n';
  md += '| 총 매출 | $' + totalRevenue.toLocaleString('en-US', {minimumFractionDigits:0}) + ' |\n';
  md += '| 평균 주문가 | $' + (totalOrders ? (totalRevenue / totalOrders).toFixed(0) : 0) + ' |\n\n';

  md += '**채널별 매출:**\n\n| 채널 | 주문 | 매출 |\n|---|---|---|\n';
  for (const [ch, v] of Object.entries(byChannel)) {
    md += '| ' + ch + ' | ' + v.count + '건 | $' + v.revenue.toLocaleString('en-US', {minimumFractionDigits:0}) + ' |\n';
  }

  // 구독 현황
  if (d.recharge_active) {
    md += '\n**활성 구독:** ' + d.recharge_active.length + '명';
  }
  // 재고
  if (d.inventory) {
    md += '\n\n**재고:**\n';
    d.inventory.forEach(item => {
      md += '- ' + item.name + ': ' + item.on_hand + '개\n';
    });
  }

  return md;
}

async function generateWithAI(prompt) {
  if (!aiConfig.key) { showToast('설정에서 AI API 키를 입력하세요'); return; }
  document.getElementById('landing').classList.add('pushed');
  const ra = document.getElementById('resultsArea');
  ra.style.display = 'block';

  // 즉시 카드 렌더 + 스트리밍 타겟
  ra.innerHTML = '<div class="result-card" style="animation:fadeUp .5s ease both"><div class="result-label"><span class="dot" style="background:var(--purple)"></span>AI 응답</div><div class="result-content streaming" id="aiStreamTarget" style="min-height:60px"><span class="loading-dots" style="display:inline-flex"><span></span><span></span><span></span></span></div><div class="result-meta" id="aiStreamMeta"><span class="tag">Claude AI</span></div></div>';

  try {
    // 컨텍스트 수집 (노션 + 대시보드 + Meta 병렬)
    const lower = prompt.toLowerCase();
    const isAdQuery = ['광고','소재','creative','ad','캠페인','campaign','meta','페이스북','인스타'].some(k => lower.includes(k));

    const [notionCtx, dataCtx, metaCtx] = await Promise.all([
      isNotionQuery(prompt) ? searchNotion(prompt).then(nr => {
        if (!nr.withContent.length) return '';
        let c = '=== 노션 문서 ===\n';
        nr.withContent.forEach(p => { c += '\n## ' + p.title + '\n' + (p.content || '(빈 페이지)').slice(0, 1500) + '\n'; });
        return c + '\n';
      }).catch(() => '') : Promise.resolve(''),
      Promise.resolve(isDataQuery(prompt) && typeof EMBEDDED_DATA !== 'undefined' ? '=== 매출 데이터 ===\n' + getDashboardSummary(prompt) + '\n' : ''),
      isAdQuery && META_TOKEN ? fetchMetaAds(15).then(ads => {
        if (!ads.length) return '';
        let c = '=== Meta 광고 소재 (실시간) ===\n';
        ads.forEach(ad => {
          const cr = ad.creative || {};
          c += '- [' + (ad.status || '') + '] ' + (ad.name || '') + ': ' + (cr.body || '').slice(0, 150) + '\n';
        });
        return c + '\n';
      }).catch(() => '') : Promise.resolve('')
    ]);

    const context = notionCtx + dataCtx + metaCtx;
    let userMsg = prompt;
    if (context) {
      userMsg = '아래는 내부 시스템에서 가져온 참고 데이터입니다. 이 데이터를 기반으로 답변해주세요.\n\n' + context + '---\n사용자 질문: ' + prompt;
    }

    const r = await fetch(AI_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': aiConfig.key },
      body: JSON.stringify({ model: aiConfig.model, max_tokens: 4096, stream: true, system: AI_SYSTEM, messages: [{ role: 'user', content: userMsg }] })
    });

    const target = document.getElementById('aiStreamTarget');

    // HTTP 에러 처리 (4xx/5xx)
    if (!r.ok) {
      let errMsg = '응답을 생성하지 못했습니다.';
      try { const errData = await r.json(); errMsg = errData.error?.message || errMsg; } catch {}
      target.classList.remove('streaming');
      target.classList.add('rendered');
      target.innerHTML = renderBuiltInMd('⚠️ API 오류 (' + r.status + '): ' + errMsg);
      return;
    }

    if (!r.body) {
      const data = await r.json();
      const text = (data.content && data.content[0] && data.content[0].text) || '응답을 생성하지 못했습니다.';
      target.classList.remove('streaming');
      target.classList.add('rendered');
      target.innerHTML = renderBuiltInMd(text);
      saveHistory(prompt, [{ label: 'AI 응답', content: text }]);
      return;
    }

    // SSE 스트리밍 — 플레인텍스트 스트림 후 마크다운 전환
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    // 스트리밍 시작: CSS ::after가 커서 역할
    target.textContent = '';
    target.classList.add('streaming');

    // 텍스트 업데이트를 rAF로 배치 (부드러운 흐름)
    let textDirty = false;
    function flushText() {
      if (!textDirty) return;
      textDirty = false;
      target.textContent = fullText;
      // 자동 스크롤
      const card = target.closest('.result-card');
      if (card) {
        const rect = card.getBoundingClientRect();
        if (rect.bottom > window.innerHeight) {
          window.scrollBy({ top: rect.bottom - window.innerHeight + 40, behavior: 'smooth' });
        }
      }
    }

    // 60fps 루프로 텍스트 플러시
    let animId;
    function animLoop() { flushText(); animId = requestAnimationFrame(animLoop); }
    animId = requestAnimationFrame(animLoop);

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (jsonStr === '[DONE]') continue;
        try {
          const evt = JSON.parse(jsonStr);
          if (evt.type === 'content_block_delta' && evt.delta && evt.delta.text) {
            fullText += evt.delta.text;
            textDirty = true;
          }
          // API 에러 감지
          if (evt.type === 'error' && evt.error) {
            fullText += '\n⚠️ API 오류: ' + (evt.error.message || JSON.stringify(evt.error));
          }
        } catch {}
      }
    }

    cancelAnimationFrame(animId);
    flushText();

    // 스트리밍 완료 → 마크다운으로 부드러운 크로스페이드
    const finalText = fullText || '응답을 생성하지 못했습니다.';
    target.classList.remove('streaming');
    target.classList.add('rendered');
    target.innerHTML = renderBuiltInMd(finalText);

    // 복사 버튼 추가
    const meta = document.getElementById('aiStreamMeta');
    if (meta) {
      const encoded = encodeURIComponent(finalText);
      meta.innerHTML = '<span class="tag">Claude AI</span><button class="copy-btn" onclick="copyText(this,\'' + encoded.replace(/'/g,"\\'") + '\')"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>복사</button>';
    }
    saveHistory(prompt, [{ label: 'AI 응답', content: finalText }]);

    // [IMG_GEN: ...] 태그 파싱 → Higgsfield로 이미지 자동 생성
    const imgGenMatches = finalText.match(/\[IMG_GEN:\s*(.+?)\]/g);
    if (imgGenMatches && imgGenMatches.length > 0) {
      const higgsKey = localStorage.getItem('odd_higgs_key') || '';
      if (higgsKey) {
        autoGenerateImages(imgGenMatches, null, target);
      }
    }

    // 콘텐츠/에셋 관련 요청이면 Drive + Unsplash 이미지 자동 추천
    const visualKw = ['캡션','caption','콘텐츠','content','소재','creative','카피','copy','기획','plan',
      '캐러셀','carousel','릴스','reels','피드','feed','광고','ad','이미지','사진','비주얼','visual',
      '보여','찾아','에셋','asset','원료','성분','ingredient','제품','product',
      '칼선','인쇄','패키지','최종본','다이컷','package','라벨','박스'];
    const needsVisual = visualKw.some(k => prompt.toLowerCase().includes(k));
    if (needsVisual) {
      appendAssetRecommendations(prompt, ra);
    }
  } catch (e) {
    ra.innerHTML = '<div class="result-card"><div class="result-content">AI 오류: ' + esc(e.message) + '</div></div>';
  }
}

}

// ── Smart Routing ──
function isDriveSearchQuery(text) {
  const actionKw = ['찾아','검색해','보여줘','보여줄래','드라이브','파일좀','이미지좀','영상좀'];
  const hasAction = actionKw.some(k => text.includes(k));
  if (!hasAction) return false;
  const assetKw = ['사진','이미지','영상','에셋','파일','콘텐츠','소스','원본','드라이브','칼선','인쇄','패키지','최종본'];
  const questionKw = ['뭐야','뭔가','무엇','어떤','알려줘','설명해','왜','어떻게','뭐지'];
  const isQuestion = questionKw.some(k => text.includes(k));
  if (isQuestion && !assetKw.some(k => text.includes(k))) return false;
  return true;
}

function isAssetRecommendQuery(text) {
  const lower = text.toLowerCase();
  const recKw = ['추천','제안','골라','suggest','recommend'];
  const assetKw = ['이미지','사진','영상','비주얼','에셋','asset','visual','photo','image','video'];
  return recKw.some(k => lower.includes(k)) && assetKw.some(k => lower.includes(k));
}

function isBuiltInQuery(text) {
  const lower = text.toLowerCase();
  const infoKw = ['원료','성분','ingredient','가격','price','제품','product','사용법','복용','먹는법'];
  const questionKw = ['뭐야','뭔가','무엇','알려줘','설명해','어떤','어떻게','뭐지'];
  return infoKw.some(k => lower.includes(k)) && questionKw.some(k => lower.includes(k));
}

function isDataQuery(text) {
  const dataKw = ['매출','주문','수익','revenue','sales','order','구독','subscriber','재고','inventory','현황','실적','통계','데이터','dashboard','대시보드'];
  return dataKw.some(k => text.toLowerCase().includes(k));
}

function shouldUseAI(text) {
  const lower = text.toLowerCase();
  const aiTriggers = ['분석','전략','비교','개선','최적화','리뷰','피드백','평가','왜','어떻게 하면','방법','plan','strategy','analyze','improve'];
  return aiTriggers.some(k => lower.includes(k));
}

function detectIntents(prompt) {
  const intents = [];
  const lower = prompt.toLowerCase();

  // Data/dashboard intent (매출, 주문, 재고 등)
  if (isDataQuery(prompt)) intents.push('data');

  // Info intent (원료, 성분, 제품 설명 등)
  const infoKw = ['원료','성분','ingredient','설명해','제품','효과','효능','사용법'];
  if (infoKw.some(k => lower.includes(k)) && !isDataQuery(prompt)) intents.push('info');

  // Caption intent (캡션, 카피, 문구, 글귀 등)
  const captionKw = ['캡션','카피','문구','글귀','텍스트','copy','caption','헤드라인','슬로건'];
  if (captionKw.some(k => lower.includes(k))) intents.push('caption');

  // Asset recommend intent
  if (isAssetRecommendQuery(prompt)) intents.push('asset');

  // Drive search intent
  if (isDriveSearchQuery(prompt)) intents.push('drive');

  // Notion intent (제품, 브랜드, 문서 등)
  if (isNotionQuery(prompt)) intents.push('notion');

  // Image generation intent (이미지 만들어줘, 생성해줘 등)
  const imgGenKw = ['만들어','생성해','그려','디자인해','제작해','generate','create','make'];
  const imgSubjectKw = ['이미지','사진','비주얼','배너','썸네일','포스터','광고 소재','크리에이티브','image','visual','banner','thumbnail'];
  if (imgGenKw.some(k => lower.includes(k)) && imgSubjectKw.some(k => lower.includes(k))) intents.push('imagegen');

  // Video generation intent (영상 만들어줘, 비디오 생성해줘 등)
  const vidGenKw = ['만들어','생성해','제작해','generate','create','make'];
  const vidSubjectKw = ['영상','비디오','동영상','video','릴스','reels','숏폼','short','모션','motion','클립','clip'];
  if (vidGenKw.some(k => lower.includes(k)) && vidSubjectKw.some(k => lower.includes(k))) intents.push('videogen');

  return [...new Set(intents)];
}

async function autoGenerateImages(matches, _unused, targetEl) {

  for (let i = 0; i < prompts.length; i++) {
    const imgPrompt = prompts[i];
    const placeholderId = 'imggen_' + i;
    const placeholder = '<div id="' + placeholderId + '" style="margin:12px 0;padding:20px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;text-align:center"><span class="loading-dots" style="display:inline-flex"><span></span><span></span><span></span></span><div style="font-size:11px;color:var(--t5);margin-top:8px">이미지 생성 중... (' + (i+1) + '/' + prompts.length + ')</div></div>';

    const escapedPrompt = imgPrompt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const tagPattern = '\\[IMG_GEN:\\s*' + escapedPrompt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\]';
    html = html.replace(new RegExp(tagPattern), placeholder);
    targetEl.innerHTML = html;
  }

  // 병렬로 Higgsfield 이미지 생성
  const results = await Promise.allSettled(prompts.map(p =>

    }

}

// ── Nano Banana via Higgsfield (AI Image Generation) ──
const HIGGS_PROXY = AI_PROXY + '/higgs';

async function higgsGenerate(endpoint, params) {
  const key = localStorage.getItem('odd_higgs_key') || '';
  if (!key) throw new Error('Higgsfield API 키가 없습니다. 설정(⚙️)에서 입력하세요.');

  // 1) 생성 요청 (프록시 경로, 플랫 JSON)
  const r = await fetch(HIGGS_PROXY + '/' + endpoint, {
    method: 'POST',
    headers: { 'x-higgs-key': key, 'Content-Type': 'application/json' },
    body: JSON.stringify(params)
  });
  if (!r.ok) { const txt = await r.text(); let msg = 'API 오류 (' + r.status + ')'; try { const e = JSON.parse(txt); msg = e.detail || e.message || e.error || msg; } catch(_) { if (txt) msg += ': ' + txt.substring(0, 100); } throw new Error(msg); }
  const gen = await r.json();

  // 동기 응답 (즉시 결과)
  if (gen.output || gen.images || gen.image_url) return gen;

  // 2) 비동기 → 폴링 (request_id 기반)
  const pollId = gen.id || gen.request_id;
  const pollUrl = HIGGS_PROXY + '/requests/' + pollId + '/status';
  for (let i = 0; i < 60; i++) {
    await new Promise(ok => setTimeout(ok, 3000));
    const sr = await fetch(pollUrl, { headers: { 'x-higgs-key': key } });
    if (!sr.ok) continue;
    const status = await sr.json();
    if (status.status === 'completed' || status.status === 'succeeded' || status.output) return status;
    if (status.status === 'failed') throw new Error(status.error || '생성 실패');
  }
  throw new Error('시간 초과');
}

function extractImageUrl(result) {
  if (result.output?.url) return result.output.url;
  if (result.output?.image_url) return result.output.image_url;
  if (result.image_url) return result.image_url;
  if (result.images && result.images[0]) return typeof result.images[0] === 'string' ? result.images[0] : result.images[0].url;
  if (typeof result.output === 'string' && result.output.startsWith('http')) return result.output;
  return null;
}

// ── Higgsfield (AI Video Generation) ──
async function generateVideoWithHiggs(prompt) {
  const higgsKey = localStorage.getItem('odd_higgs_key') || '';
  if (!higgsKey) { showToast('설정(⚙️)에서 Higgsfield API 키를 입력하세요'); return; }

  document.getElementById('landing').classList.add('pushed');
  const ra = document.getElementById('resultsArea');
  ra.style.display = 'block';
  ra.innerHTML = '<div class="result-card"><div class="result-label"><span class="dot" style="background:var(--blue)"></span>AI 영상 생성 중...</div><div class="result-content" id="higgsTarget" style="white-space:normal;min-height:120px"><span class="loading-dots" style="display:inline-flex"><span></span><span></span><span></span></span><span style="color:var(--t4);font-size:13px;margin-left:12px">Higgsfield로 영상을 생성하고 있습니다... (최대 2-3분 소요)</span></div></div>';

  const brandContext = 'ODD brand: premium dark aesthetic, minimalist, sleek M-01 supplement bottle, deep red #bf2026 accent on black, cinematic mood, sophisticated.';

  try {
    // 1) 생성 요청 (프록시 경로)
    const r = await fetch(HIGGS_PROXY + '/v1/generations', {
      method: 'POST',
      headers: { 'x-higgs-key': higgsKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: prompt + '. ' + brandContext,
        duration: 5,
        aspect_ratio: '9:16'
      })
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || e.message || 'API 오류 (' + r.status + ')'); }
    const gen = await r.json();
    const genId = gen.id || gen.generation_id;
    if (!genId) throw new Error('생성 ID를 받지 못했습니다');

    // 2) 상태 폴링 (최대 3분, 프록시 경로)
    const target = document.getElementById('higgsTarget');
    let videoUrl = null;
    for (let i = 0; i < 36; i++) {
      await new Promise(ok => setTimeout(ok, 5000));
      const sr = await fetch(HIGGS_PROXY + '/v1/generations/' + genId, {
        headers: { 'x-higgs-key': higgsKey }
      });
      if (!sr.ok) continue;
      const status = await sr.json();
      const state = status.status || status.state;
      target.innerHTML = '<span style="color:var(--t4);font-size:13px">영상 생성 중... (' + state + ')</span>';

      if (state === 'completed' || state === 'succeeded') {
        videoUrl = status.output?.url || status.video_url || status.result?.url || status.output;
        break;
      }
      if (state === 'failed' || state === 'error') {
        throw new Error(status.error || '영상 생성 실패');
      }
    }

    if (!videoUrl) throw new Error('시간 초과 — 나중에 Higgsfield 대시보드에서 확인하세요');

    // 3) 결과 표시
    target.innerHTML = '<video src="' + videoUrl + '" controls playsinline style="max-width:100%;border-radius:12px;border:1px solid var(--border)"></video>' +
      '<div style="margin-top:8px"><a href="' + videoUrl + '" download="odd_ai_video.mp4" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:12px;text-decoration:none;cursor:pointer">⬇ 영상 다운로드</a></div>';
    ra.querySelector('.result-label').innerHTML = '<span class="dot" style="background:var(--blue)"></span>AI 생성 영상';
    const meta = document.createElement('div');
    meta.className = 'result-meta';
    meta.innerHTML = '<span class="tag">Higgsfield</span><span class="tag">AI Video</span>';
    target.parentElement.appendChild(meta);
    saveHistory(prompt, [{ label: 'AI 영상 생성', content: prompt }]);
  } catch (e) {
    const target = document.getElementById('higgsTarget');
    if (target) target.innerHTML = '<div style="color:var(--red)">영상 생성 오류: ' + e.message + '</div>';
  }
}

function generate() {
  const prompt = promptInput.value.trim();
  if (!prompt && files.length === 0) return;

  const intents = detectIntents(prompt);
  const lower = prompt.toLowerCase();

  // 영상 생성 요청 → Higgsfield
  if (intents.includes('videogen')) {
    generateVideoWithHiggs(prompt);
    return;
  }

  // 이미지 생성 요청 → Nano Banana
  if (intents.includes('imagegen')) {
    generateImageWithNano(prompt);
    return;
  }

  // ODD 내부 자료 요청 ("원료 사진 보여줘", "M-01 이미지 찾아줘") →
  // AI가 내용 설명 + Drive에서 실제 이미지 검색
  const isOddAssetQuery = ODD_KNOWLEDGE_MAP && Object.values(ODD_KNOWLEDGE_MAP).some(
    map => map.triggers.some(t => lower.includes(t))
  ) && ['사진','이미지','영상','보여','찾아','에셋','asset','photo','image','video'].some(k => lower.includes(k));

  if (isOddAssetQuery && aiConfig.key) {
    generateWithAI(prompt);  // AI가 설명 + appendAssetRecommendations에서 Drive 검색
    return;
  }

  // 일반 에셋 검색 (ODD 지식맵에 없는 외부 검색) → Drive+Unsplash 직행
  if (intents.includes('drive') || (intents.length === 1 && intents[0] === 'asset')) {
    handleMultiIntent(prompt, intents);
    return;
  }

  // 모든 질문 → AI로 즉시 응답 (노션/대시보드 컨텍스트 자동 포함)
  if (aiConfig.key) {
    generateWithAI(prompt);
    return;
  }

  // AI 키 없으면 기본 캡션
  _origGenerate();
}

async function buildCaptions(prompt, ch) {
  const isAd = state.type === 'ad';
  const fn = state.funnel;
  const tension = state.tension;
  const results = [];
  const chLabel = { meta: 'Meta', tiktok: 'TikTok', google: 'Google' }[ch];
  const chColor = { meta: '#4f8df9', tiktok: '#ff3b5c', google: '#34a853' }[ch];
  const fnColor = { tof: '#38bdf8', mof: '#a78bfa', bof: '#f97316' }[fn];

  const caption = await generateCaptionWithAI(prompt, ch, fn, tension, isAd);
  const prefix = state.channel === 'all' ? '통합 ' : '';

  const warnings = guidelineCheck(caption.text);
  const captionContent = warnings.length
    ? caption.text + '\n\n' + '─'.repeat(30) + '\n⚠️ 가이드라인 체크:\n' + warnings.join('\n')
    : caption.text;

  results.push({
    label: prefix + '캡션' + (isAd ? ' [' + fn.toUpperCase() + ']' : ''),
    content: captionContent,
    color: isAd ? fnColor : chColor,
    tags: caption.tags,
    channel: ch
  });

  if (isAd) {
    const cta = oddCTA(ch, fn);
    results.push({ label: prefix + 'CTA', content: cta.text, color: chColor, tags: cta.tags, channel: ch });
  }

  if (ch !== 'google') {
    const theme = isAd ? 'campaign' : 'lifestyle';
    const ht = oddHashtags(ch, isAd, theme);
    results.push({ label: prefix + '해시태그', content: ht, color: 'var(--t4)', channel: ch });
  }

  return results;
}

// ── Render Results ──
function renderResults(results, detectedMode) {
  const area = document.getElementById('resultsArea');
  let html = '';

  // Mode badge
  if (detectedMode) {
    const badgeText = detectedMode === 'content' ? '🎨 콘텐츠 모드' : detectedMode === 'caption' ? '📝 캡션 모드' : '📝+🎨 통합 모드';
    html += '<div class="mode-badge">' + badgeText + '</div>';
  }

  html += results.map((r, i) => {
    if (r.htmlContent) {
      return '<div class="result-card" style="animation-delay:' + (i * .06) + 's">' +
        '<div class="result-label" style="color:' + r.color + '"><span class="dot" style="background:' + r.color + '"></span>' + esc(r.label) + '</div>' +
        '<div class="result-content" style="white-space:normal">' + r.content + '</div>' +
        '<div class="result-meta">' +
          (r.tags ? r.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('') : '') +
        '</div></div>';
    } else {
      const encoded = encodeURIComponent(r.content);
      return '<div class="result-card" style="animation-delay:' + (i * .06) + 's">' +
        '<div class="result-label" style="color:' + r.color + '"><span class="dot" style="background:' + r.color + '"></span>' + esc(r.label) + '</div>' +
        '<div class="result-content">' + esc(r.content) + '</div>' +
        '<div class="result-meta">' +
          (r.tags ? r.tags.map(t => '<span class="tag">' + esc(t) + '</span>').join('') : '') +
          '<button class="copy-btn" onclick="copyText(this,\'' + encoded + '\')"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>복사</button>' +
        '</div></div>';
    }
  }).join('');

  area.innerHTML = html;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyText(btn, encoded) {
  navigator.clipboard.writeText(decodeURIComponent(encoded)).then(() => {
    showToast('복사되었습니다');
    btn.textContent = '✓';
    setTimeout(() => { btn.innerHTML = '<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>복사'; }, 1500);
  });
}

// ── History (localStorage) ──
function getHistory() {
  try { return JSON.parse(localStorage.getItem('odd_caption_history') || '[]'); } catch { return []; }
}
function saveHistory(prompt, results) {
  const history = getHistory();
  history.unshift({
    id: Date.now(),
    time: new Date().toISOString(),
    prompt: prompt,
    files: files.map(f => ({ name: f.name, type: f.type })),
    settings: { ...state },
    results: results.map(r => ({ label: r.label, content: r.content }))
  });
  if (history.length > 100) history.length = 100;
  localStorage.setItem('odd_caption_history', JSON.stringify(history));
  updateBadge();
}

function updateBadge() {
  const count = getHistory().length;
  const badge = document.getElementById('historyBadge');
  if (count > 0) { badge.style.display = ''; badge.textContent = count > 99 ? '99+' : count; }
  else badge.style.display = 'none';
}

function openHistory() {
  document.getElementById('historyOverlay').classList.add('open');
  document.getElementById('historyPanel').classList.add('open');
  renderHistoryList();
}
function closeHistory() {
  document.getElementById('historyOverlay').classList.remove('open');
  document.getElementById('historyPanel').classList.remove('open');
}

function renderHistoryList() {
  const history = getHistory();
  const container = document.getElementById('historyContent');
  if (!history.length) {
    container.innerHTML = '<div class="history-empty">아직 생성 기록이 없습니다.</div>';
    return;
  }
  const typeLabel = { ad: '광고', organic: '일반' };
  const chLabel = { all: '통합', meta: 'Meta', tiktok: 'TikTok', google: 'Google' };
  const fnLabel = { tof: 'TOF', mof: 'MOF', bof: 'BOF' };

  container.innerHTML = '<div class="history-list">' + history.map((h, i) => {
    const d = new Date(h.time);
    const timeStr = d.getMonth() + 1 + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    const s = h.settings;
    let tagsHtml = '<span>' + (typeLabel[s.type] || s.type) + '</span><span>' + (chLabel[s.channel] || s.channel) + '</span>';
    if (s.type === 'ad') tagsHtml += '<span>' + (fnLabel[s.funnel] || '') + '</span>';
    const filesHtml = h.files.length ? '<div class="history-item-files">' + h.files.map(f => '<span>' + esc(f.name) + '</span>').join('') + '</div>' : '';
    return '<div class="history-item" onclick="showHistoryDetail(' + i + ')">' +
      '<div class="history-item-header"><div class="history-item-tags">' + tagsHtml + '</div><span class="history-item-time">' + timeStr + '</span></div>' +
      '<div class="history-item-prompt">' + esc(h.prompt || '(파일만 첨부)') + '</div>' +
      filesHtml + '</div>';
  }).join('') + '</div>';
}

function showHistoryDetail(idx) {
  const history = getHistory();
  const h = history[idx];
  if (!h) return;
  const container = document.getElementById('historyContent');
  const d = new Date(h.time);
  const timeStr = d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');

  let html = '<div class="history-detail">';
  html += '<button class="history-detail-back" onclick="renderHistoryList()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> 목록으로</button>';
  html += '<div style="font-size:11px;color:var(--t5);margin-bottom:12px">' + timeStr + '</div>';
  if (h.files.length) {
    html += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">' + h.files.map(f => '<span style="font-size:10px;color:var(--t4);background:rgba(255,255,255,.05);padding:3px 8px;border-radius:6px">' + esc(f.name) + '</span>').join('') + '</div>';
  }
  html += '<div class="history-detail-prompt">' + esc(h.prompt || '(파일만 첨부)') + '</div>';
  h.results.forEach(r => {
    html += '<div class="history-detail-result"><div class="label">' + esc(r.label) + '</div><div class="content">' + esc(r.content) + '</div></div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function openSettings() {
  document.getElementById('settingsAiKey').value = localStorage.getItem('odd_ai_key') || '';
  document.getElementById('settingsNotionKey').value = localStorage.getItem('odd_notion_key') || '';
  document.getElementById('settingsNanoKey').value = localStorage.getItem('odd_nano_key') || '';
  document.getElementById('settingsHiggsKey').value = localStorage.getItem('odd_higgs_key') || '';
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}
function saveSettings() {
  const aiKey = document.getElementById('settingsAiKey').value.trim();
  const notionKey = document.getElementById('settingsNotionKey').value.trim();
  const nanoKey = document.getElementById('settingsNanoKey').value.trim();
  const higgsKey = document.getElementById('settingsHiggsKey').value.trim();
  if (aiKey) { localStorage.setItem('odd_ai_key', aiKey); aiConfig.key = aiKey; }
  else { localStorage.removeItem('odd_ai_key'); aiConfig.key = ''; }
  if (notionKey) { localStorage.setItem('odd_notion_key', notionKey); NOTION_KEY = notionKey; }
  else { localStorage.removeItem('odd_notion_key'); NOTION_KEY = ''; }
  if (nanoKey) { localStorage.setItem('odd_nano_key', nanoKey); }
  else { localStorage.removeItem('odd_nano_key'); }
  if (higgsKey) { localStorage.setItem('odd_higgs_key', higgsKey); }
  else { localStorage.removeItem('odd_higgs_key'); }
  closeSettings();
  showToast('설정이 저장되었습니다');
}

// Init
updateBadge();
</script>
