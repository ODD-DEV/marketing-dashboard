<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODD. Analytics Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23bf2026'/><text x='16' y='23' text-anchor='middle' font-family='Arial,sans-serif' font-weight='700' font-size='20' fill='white'>A</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
@font-face{font-family:'EditorsNote';src:url('https://odd.us/_astro/fonts/57868cb6368acd8f.woff2') format('woff2');font-weight:300;font-display:swap}
@font-face{font-family:'EditorsNote';src:url('https://odd.us/_astro/fonts/77de016475a91854.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'EditorsNote';src:url('https://odd.us/_astro/fonts/9387036ea37689ec.woff2') format('woff2');font-weight:600;font-display:swap}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

:root{
  --bg:#000;--bg-raised:#1d1d1f;--bg-card:#1d1d1f;
  --border:rgba(255,255,255,.12);--border-h:rgba(255,255,255,.2);
  --t1:#f5f5f7;--t2:#d1d1d6;--t3:#a1a1a6;--t4:#86868b;--t5:#6e6e73;
  --red:#bf2026;--red-light:#d4343a;--red-dim:rgba(191,32,38,.1);--red-glow:rgba(191,32,38,.25);--red-border:rgba(191,32,38,.25);
  --green:#30d158;--orange:#ff9f0a;--pink:#ff375f;--purple:#bf5af2;--yellow:#ffd60a;--blue:#0a84ff;
  --accent:#bf2026;--accent-dim:rgba(191,32,38,.1);--accent-border:rgba(191,32,38,.25);--accent-glow:rgba(191,32,38,.25);
  --serif:'EditorsNote','Georgia','Times New Roman',serif;
  --sans:'Pretendard',-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);--r:16px;--r-s:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:#000}
body{font-family:var(--sans);background:#000;color:var(--t2);line-height:1.55;font-size:15px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(255,255,255,.08);margin-top:16px}
.nav-inner{max-width:1120px;margin:0 auto;padding:0 28px;height:48px;display:flex;align-items:center;justify-content:space-between}
.nav-left{display:flex;align-items:center;gap:14px}
.logo-img{height:18px;width:auto;object-fit:contain;display:block}
.nav-right{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--t4);white-space:nowrap;overflow:hidden;flex-shrink:1;min-width:0}
.nav-live-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3)}
.nav-live-status .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nav-live-status .live-time{color:var(--t4)}
.dash-switcher{display:flex;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:100px;padding:3px;margin-left:16px;border:1px solid rgba(255,255,255,.1);position:relative;touch-action:pan-x}
.dash-switch{padding:7px 20px;border-radius:100px;font-size:13px;font-weight:600;color:var(--t4);text-decoration:none;transition:all .2s;letter-spacing:.3px;-webkit-user-select:none;user-select:none}
.dash-switch:hover{color:var(--t2)}
.dash-switch.active{background:var(--accent-dim);color:var(--accent)}

/* Main */
main{max-width:1120px;margin:0 auto;padding:0 28px 80px}

/* ═══ Tabs (same as index.html) ═══ */
.tabs-area{padding:28px 0 0}
.month-tabs{display:flex;gap:3px;flex-wrap:wrap}
.month-tab{padding:10px 22px;border-radius:100px;border:none;background:transparent;color:var(--t4);cursor:pointer;font-size:15px;font-weight:500;transition:all .2s;font-family:var(--sans)}
.month-tab:hover{color:var(--t2);background:rgba(255,255,255,.06)}
.month-tab.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.month-tab.all-tab{color:var(--t3)}
.month-tab.all-tab:hover{color:var(--t2)}
.month-tab.all-tab.active{background:var(--accent-dim);color:var(--accent)}
.week-tabs{display:flex;gap:3px;flex-wrap:wrap;align-items:center;margin-top:8px;justify-content:center}
.week-tab{padding:4px 12px;border-radius:100px;border:none;background:transparent;color:var(--t5);cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;font-family:var(--sans)}
.week-tab:hover{color:var(--t3);background:rgba(255,255,255,.05)}
.week-tab.active{background:var(--accent-dim);color:var(--accent);font-weight:600}

/* Hero KPI */
.summary-sticky{position:sticky;top:48px;z-index:90;background:#000;padding-bottom:8px;transition:all .3s ease}
.summary-sticky::after{content:'';position:absolute;bottom:-24px;left:0;right:0;height:24px;background:linear-gradient(to bottom,#000,transparent);pointer-events:none;z-index:89}
.hero-kpi{text-align:center;padding:56px 40px 48px;margin:0;position:relative;animation:fadeUp .7s var(--ease) both;transition:padding .3s ease}
.hero-kpi::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.hero-kpi-tag{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--t3);letter-spacing:.5px;margin-bottom:20px}
.hero-kpi-tag::before{content:'';width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block}
.hero-kpi-value{font-family:var(--sans);font-size:clamp(64px,10vw,120px);color:var(--t1);line-height:1;letter-spacing:-2px;font-weight:700;transform:scaleX(.97);transform-origin:center;transition:font-size .3s ease}
.hero-kpi-sub{font-size:17px;color:var(--t3);margin-top:16px;font-weight:400;transition:all .3s ease}

/* Metric Tiles */
.metric-tiles{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;margin:0;animation:fadeUp .6s var(--ease) .05s both;border-radius:var(--r);overflow:hidden;transition:gap .3s ease}
.m-tile{background:var(--bg-raised);padding:32px 24px;transition:all .35s var(--ease);position:relative;cursor:default}
.m-tile::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(10,132,255,.08) 0%,transparent 55%);opacity:0;transition:opacity .4s;pointer-events:none}
.m-tile:hover{background:#2c2c2e}
.m-tile:hover::after{opacity:1}
.m-tile:hover .m-tile-value{color:var(--t1) !important}
.m-tile-label{font-size:12px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:12px}
.m-tile-value{font-family:var(--sans);font-size:36px;line-height:1;letter-spacing:-1px;font-weight:700;transition:color .3s;animation:countUp .5s var(--ease) both}
.m-tile-sub{font-size:13px;color:var(--t4);margin-top:10px;line-height:1.5}
.m-tile-sub b{color:var(--t3);font-weight:600}

/* Content Sections */
.content-section{padding:56px 0 0;animation:fadeUp .5s var(--ease) both;position:relative;z-index:1;background:#000}
.section-tag{font-size:14px;font-weight:600;color:var(--accent);letter-spacing:.5px;margin-bottom:8px}
.section-heading{font-family:var(--sans);font-size:32px;color:var(--t1);font-weight:500;letter-spacing:-.5px;margin-bottom:32px;line-height:1.2}
.section-head-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:32px}
.section-head-row .section-heading{margin-bottom:0}

/* Cards */
.card{background:var(--bg-raised);border-radius:var(--r);padding:28px;border:none;transition:background .2s}
.card:hover{background:#242426}
.card-title{font-size:12px;font-weight:600;color:var(--t4);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px;flex-wrap:wrap;text-transform:uppercase;letter-spacing:1px}
.card-title .ct-sub{font-size:13px;color:var(--t4);font-weight:400;text-transform:none;letter-spacing:0}

/* Layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:stretch}
.two-col>.card{display:flex;flex-direction:column}
.two-col>.card .donut-wrap{flex:1;display:flex;align-items:center;justify-content:center;gap:28px;margin:12px 0}

/* Tables */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 14px;font-size:11px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);font-weight:600;background:rgba(255,255,255,.03)}
td{padding:12px 14px;font-size:14px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t2);transition:background .15s}
tr:hover td{background:rgba(255,255,255,.03)}
.text-right{text-align:right}.text-center{text-align:center}
.table-wrap{max-height:500px;overflow-y:auto;overflow-x:auto;border-radius:var(--r);background:var(--bg-raised)}
.table-wrap th{position:sticky;top:0;z-index:1;background:var(--bg-raised);backdrop-filter:blur(12px)}

/* Badges */
.badge{background:rgba(255,255,255,.06);padding:4px 12px;border-radius:100px;font-size:12px;color:var(--t3);font-weight:500;border:none}

/* Bar Charts */
.region-bar-row{display:flex;align-items:center;gap:10px;margin:5px 0;transition:transform .15s}
.region-bar-row:hover{transform:translateX(3px)}
.region-bar-label{min-width:110px;font-size:13px;color:var(--t3);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.region-bar-fill{height:30px;border-radius:8px;display:flex;align-items:center;padding-left:10px;font-size:12px;color:#fff;font-weight:600;min-width:2px;transition:width 1.4s cubic-bezier(.16,1,.3,1),filter .2s;position:relative;overflow:hidden}
.region-bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 50%);pointer-events:none}
.region-bar-fill:hover{filter:brightness(1.1)}
.region-bar-count{font-size:12px;color:var(--t4);min-width:36px;text-align:right}
.region-bar-pct{font-size:12px;color:var(--t2);min-width:42px;text-align:right;font-weight:600}

/* Colors */
.green{color:var(--green)}.blue{color:var(--blue)}.purple{color:var(--purple)}.orange{color:var(--orange)}.red{color:var(--red)}.pink{color:var(--pink)}

/* Stat rows */
.stat-row{display:flex;justify-content:space-between;padding:11px 0;font-size:14px}
.stat-row+.stat-row{border-top:1px solid rgba(255,255,255,.05)}
.stat-row .label{color:var(--t3)}.stat-row .val{font-weight:600;letter-spacing:-.2px;color:var(--t2)}

/* Line Chart */
.line-chart-container{position:relative;width:100%}
.line-chart-svg{width:100%;display:block}
.line-chart-legend{display:flex;gap:18px;justify-content:flex-end;margin-top:0;padding:10px 4px 0;flex-wrap:wrap}
.line-chart-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.line-chart-legend-dot{width:16px;height:1.5px;border-radius:1px;opacity:.7}

/* Donut */
.donut-wrap{display:flex;align-items:center;gap:36px;justify-content:center;margin:20px 0;padding:16px 0}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:14px}
.donut-legend-item{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:400;color:var(--t2)}
.donut-legend-dot{width:12px;height:12px;border-radius:4px;flex-shrink:0}

/* Compare cards */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.compare-card{background:var(--bg-raised);border-radius:var(--r);padding:28px;text-align:center}
.compare-card-title{font-size:12px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.compare-card-value{font-size:36px;font-weight:700;color:var(--t1);letter-spacing:-1px;margin-bottom:8px}
.compare-card-sub{font-size:13px;color:var(--t4)}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:24px;transition:opacity .5s ease}
.loading-overlay.fade-out{opacity:0;pointer-events:none}
.loading-overlay .loader-logo{position:relative;user-select:none;display:inline-block}
.loading-overlay .loader-logo img{opacity:.12}
.loading-overlay .loader-logo::after{content:'';position:absolute;left:0;top:0;width:100%;height:100%;background:#bf2026;-webkit-mask-image:url(odd_logo_white.png);mask-image:url(odd_logo_white.png);-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;clip-path:inset(100% 0 0 0);animation:logoFill 1.8s cubic-bezier(.4,0,.2,1) forwards}
.loading-overlay .loader-bar{width:120px;height:3px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.loading-overlay .loader-bar::after{content:'';display:block;height:100%;width:40%;background:var(--red);border-radius:4px;animation:loaderSlide 1.2s ease-in-out infinite}
@keyframes logoFill{0%{clip-path:inset(100% 0 0 0)}100%{clip-path:inset(0 0 0 0)}}
@keyframes loaderSlide{0%{transform:translateX(-100%)}50%{transform:translateX(200%)}100%{transform:translateX(-100%)}}
.hidden{display:none}

/* Footer */
.footer-text{text-align:center;padding:48px 0 32px;color:var(--t5);font-size:12px;letter-spacing:.3px}

/* No data */
.no-data{color:var(--t4);text-align:center;padding:40px;font-size:15px}

/* Channel color dots */
.ch-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}

/* Purchase highlight */
tr.has-purchase td{background:rgba(10,132,255,.04)}
tr.has-purchase:hover td{background:rgba(10,132,255,.08)}

/* Disclaimer */
.disclaimer{font-size:11px;color:var(--t5);margin-top:12px;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:8px;line-height:1.5}

@media(max-width:900px){
  .two-col{grid-template-columns:1fr}
  .compare-grid{grid-template-columns:1fr 1fr}
  .metric-tiles{grid-template-columns:repeat(3,1fr)}
  .hero-kpi-value{font-size:64px !important}
  .hero-kpi{padding:24px 16px 20px}
  .hero-kpi-sub{font-size:13px !important}
  main,.nav-inner{padding-left:16px;padding-right:16px}
  .section-heading{font-size:24px}
  .m-tile-value{font-size:24px !important}
  .m-tile-sub{font-size:10px !important}
  .m-tile-label{font-size:10px !important}
  .dash-switcher{margin-left:10px}
  .dash-switch{padding:4px 12px;font-size:11px}
}
@media(max-width:600px){
  .metric-tiles{grid-template-columns:repeat(3,1fr)}
  .hero-kpi-value{font-size:48px !important}
  .hero-kpi{padding:24px 12px 20px}
  .hero-kpi-tag{display:none}
  .hero-kpi::after{display:none}
  .hero-kpi-sub{font-size:12px !important;margin-top:4px}
  .m-tile{padding:12px !important}
  .m-tile-label{font-size:8px !important;margin-bottom:6px !important;letter-spacing:1.2px}
  .m-tile-value{font-size:16px !important;letter-spacing:.1px}
  .m-tile-sub{font-size:8px !important;margin-top:5px;line-height:1.3}
  main,.nav-inner{padding-left:12px;padding-right:12px}
  .nav-inner{height:44px}
  .content-section{padding-top:28px}
  .section-heading{font-size:20px;margin-bottom:16px}
  .section-tag{font-size:12px;margin-bottom:4px}
  .tabs-area{padding-top:10px}
  .month-tabs{gap:0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:100px;border:1px solid rgba(255,255,255,.08);padding:3px;scroll-snap-type:x mandatory}
  .month-tabs::-webkit-scrollbar{display:none}
  .month-tab{padding:7px 14px;font-size:12px;flex-shrink:0;scroll-snap-align:center;border-radius:100px;white-space:nowrap}
  .donut-wrap{flex-direction:column;gap:16px;padding:8px 0}
  .donut-svg{width:120px !important;height:120px !important}
  .donut-legend{gap:8px}
  .donut-legend-item{font-size:13px}
  .compare-grid{grid-template-columns:1fr}
  .region-bar-label{min-width:60px !important;max-width:60px !important;font-size:11px !important}
  table{font-size:11px}
  th,td{padding:8px 10px}
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="auth-gate" style="display:none"></div>

<div class="loading-overlay" id="loadingOverlay"><div class="loader-logo"><img src="odd_logo_white.png" alt="ODD." style="height:48px"></div><div class="loader-bar"></div></div>

<div id="dashboard-content" style="display:none">
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-left">
      <img src="odd_logo_white.png" class="logo-img" alt="ODD.">
      <div class="dash-switcher">
        <a href="index.html" class="dash-switch">Sales</a>
        <a href="performance.html" class="dash-switch">Performance</a>
        <a href="analytics.html" class="dash-switch active">Analytics</a>
      </div>
    </div>
    <div class="nav-right">
      <span id="dataStatus" class="nav-live-status"></span>
      <div id="user-bar" style="display:none;align-items:center;gap:8px">
        <img id="user-photo" style="width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,.1)" src="">
        <span id="user-email" style="display:none"></span>
        <button onclick="signOut()" style="padding:3px 10px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#86868b;font-size:10px;cursor:pointer;font-family:Pretendard,sans-serif">로그아웃</button>
      </div>
    </div>
  </div>
</nav>

<main>
  <!-- Period Tabs (same as Sales dashboard) -->
  <div class="tabs-area">
    <div class="month-tabs" id="monthTabs"></div>
    <div class="week-tabs" id="weekTabs"></div>
  </div>

  <!-- 1. Hero KPI + Metric Tiles -->
  <div class="summary-sticky" id="summaryCards"></div>

  <!-- 2. Traffic Acquisition -->
  <section class="content-section">
    <div class="section-tag">Acquisition</div>
    <h2 class="section-heading">트래픽 채널 분석</h2>
    <div class="card">
      <div class="table-wrap" id="trafficTable"></div>
    </div>
  </section>

  <!-- 3. Daily Trend -->
  <section class="content-section">
    <div class="section-tag">Daily Trend</div>
    <h2 class="section-heading">일별 세션 추이</h2>
    <div class="card" id="dailyChart" style="padding:28px 28px 20px"></div>
  </section>

  <!-- 4. Landing Pages -->
  <section class="content-section">
    <div class="section-tag">Landing Pages</div>
    <div class="section-head-row">
      <h2 class="section-heading">랜딩 페이지 성과</h2>
      <span class="badge" id="landingPeriodBadge"></span>
    </div>
    <div class="card">
      <div class="table-wrap" id="landingTable"></div>
    </div>
  </section>

  <!-- 5. Device + Geo -->
  <section class="content-section">
    <div class="section-tag">Segments</div>
    <h2 class="section-heading">디바이스 & 지역 분석</h2>
    <div class="two-col">
      <div class="card" id="deviceChart"></div>
      <div class="card" id="geoChart"></div>
    </div>
  </section>

  <!-- 6. New vs Returning -->
  <section class="content-section">
    <div class="section-tag">User Type</div>
    <h2 class="section-heading">신규 vs 재방문</h2>
    <div class="compare-grid" id="nvrCards"></div>
  </section>

  <!-- 7. Top Pages -->
  <section class="content-section">
    <div class="section-tag">Content</div>
    <div class="section-head-row">
      <h2 class="section-heading">페이지별 조회수</h2>
      <span class="badge" id="pagesPeriodBadge"></span>
    </div>
    <div class="card">
      <div class="table-wrap" id="pagesTable"></div>
    </div>
  </section>

  <!-- 8. Purchase Attribution (with disclaimer) -->
  <section class="content-section">
    <div class="section-tag">Attribution</div>
    <h2 class="section-heading">구매 소스 분석</h2>
    <div class="card">
      <div class="table-wrap" id="attributionTable"></div>
      <div class="disclaimer">* GA4 추적 기준 (ERP 실매출과 차이 있을 수 있음)</div>
    </div>
  </section>

  <div class="footer-text">ODD. Analytics Dashboard &copy; 2026</div>
</main>
</div>

<script src="data.js"></script>
<script src="ga4_data.js"></script>
<script>
(function(){
  'use strict';

  var DATA = window.GA4_DATA || {};
  var ERP = window.EMBEDDED_DATA || {};

  /* ── ERP 매출 데이터를 날짜별로 집계 (전체 채널) ── */
  var erpByDate = {};
  var erpTotal = {orders:0, rev:0};
  (ERP.orders||[]).forEach(function(o){
    if(o.s!=='sale' && o.s!=='done') return;
    if(!erpByDate[o.d]) erpByDate[o.d]={orders:0,rev:0};
    erpByDate[o.d].orders++;
    erpByDate[o.d].rev+=o.t;
    erpTotal.orders++;
    erpTotal.rev+=o.t;
  });

  /* ── Utility ── */
  function num(n){ return (n||0).toLocaleString(); }
  function dollar(v){ return '$'+(v||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}); }
  function pct(v){ return (v||0).toFixed(1)+'%'; }
  function fmtDur(s){ if(!s) return '0s'; var m=Math.floor(s/60),sec=Math.round(s%60); return m>0?m+'m '+sec+'s':sec+'s'; }

  /* ── GA4 date "YYYYMMDD" → "YYYY-MM-DD" ── */
  function ga4ToISO(d){ return d ? d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8) : ''; }

  /* ── Month/Week helpers (same logic as index.html) ── */
  function getMonth(d){ return d ? d.substring(0,7) : ''; }
  function fmtMon(y){ var p=y.split('-'); return (p[0]==='2025'?"'25 ":"'26 ")+parseInt(p[1])+'월'; }
  function getWeekSunday(d){ var x=new Date(d+'T12:00:00'); x.setDate(x.getDate()-x.getDay()); return x.toISOString().substring(0,10); }
  function fmtWeek(s){ var a=new Date(s+'T12:00:00'),b=new Date(a); b.setDate(b.getDate()+6); return (a.getMonth()+1)+'/'+a.getDate()+' ~ '+(b.getMonth()+1)+'/'+b.getDate(); }

  var ALL_MONTHS=[];
  var selectedMonths=new Set();
  var selectedWeeks=new Set();
  var isAllWeeks=true;
  var isAllMode=true;

  /* ── Collect months from GA4 traffic_daily ── */
  function initMonths(){
    var m={};
    (DATA.traffic_daily||[]).forEach(function(r){
      var iso=ga4ToISO(r.date);
      var mo=getMonth(iso);
      if(mo) m[mo]=true;
    });
    ALL_MONTHS=Object.keys(m).sort().reverse();
    isAllMode=true;
    selectedMonths=new Set(ALL_MONTHS);
    selectedWeeks=new Set();
    isAllWeeks=true;
    renderMonthTabs();
    renderWeekTabs();
  }

  function renderMonthTabs(){
    var c=document.getElementById('monthTabs');
    var h='<button class="month-tab all-tab '+(isAllMode?'active':'')+'" data-m="all">전체</button>';
    ALL_MONTHS.forEach(function(m){
      var a=!isAllMode&&selectedMonths.has(m);
      h+='<button class="month-tab '+(a?'active':'')+'" data-m="'+m+'">'+fmtMon(m)+'</button>';
    });
    c.innerHTML=h;

    var _isDrag=false,_startX=0;
    c.addEventListener('pointerdown',function(e){_isDrag=false;_startX=e.clientX});
    c.addEventListener('pointermove',function(e){if(Math.abs(e.clientX-_startX)>10)_isDrag=true});
    c.querySelectorAll('.month-tab').forEach(function(b){
      b.addEventListener('pointerup',function(){
        var m=b.dataset.m;
        if(_isDrag){
          if(m==='all'){isAllMode=true;selectedMonths=new Set(ALL_MONTHS)}
          else{isAllMode=false;selectedMonths=new Set([m])}
        }else{
          if(m==='all'){isAllMode=true;selectedMonths=new Set(ALL_MONTHS)}
          else{if(isAllMode){isAllMode=false;selectedMonths=new Set([m])}
          else{if(selectedMonths.has(m)){selectedMonths.delete(m);if(!selectedMonths.size){isAllMode=true;selectedMonths=new Set(ALL_MONTHS)}}else selectedMonths.add(m)}}
        }
        selectedWeeks=new Set();isAllWeeks=true;renderMonthTabs();renderWeekTabs();renderAll();
      });
    });
    var act=c.querySelector('.month-tab.active');
    if(act) act.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  }

  function getWeeksInMonth(ym){
    var w={};
    (DATA.traffic_daily||[]).forEach(function(r){
      var iso=ga4ToISO(r.date);
      if(getMonth(iso)===ym){
        var s=getWeekSunday(iso);
        w[s]=(w[s]||0)+1;
      }
    });
    return Object.keys(w).sort();
  }

  function renderWeekTabs(){
    var c=document.getElementById('weekTabs');
    if(selectedMonths.size!==1){c.innerHTML='';selectedWeeks=new Set();isAllWeeks=true;return}
    var mo=Array.from(selectedMonths)[0], wk=getWeeksInMonth(mo);
    if(!wk.length){c.innerHTML='';return}
    if(isAllWeeks) selectedWeeks=new Set(wk);
    var h='<span style="font-size:11px;color:var(--t4);letter-spacing:.5px;font-weight:600;margin-right:4px">주간:</span>';
    h+='<button class="week-tab '+(isAllWeeks?'active':'')+'" data-w="all">전체</button>';
    wk.forEach(function(w){
      var a=!isAllWeeks&&selectedWeeks.has(w);
      h+='<button class="week-tab '+(a?'active':'')+'" data-w="'+w+'">'+fmtWeek(w)+'</button>';
    });
    c.innerHTML=h;
    c.querySelectorAll('.week-tab').forEach(function(b){
      b.addEventListener('click',function(){
        var w=b.dataset.w;
        if(w==='all'){isAllWeeks=true;selectedWeeks=new Set(wk)}
        else{
          if(isAllWeeks){isAllWeeks=false;selectedWeeks=new Set([w])}
          else{
            if(selectedWeeks.has(w)){selectedWeeks.delete(w);if(!selectedWeeks.size){isAllWeeks=true;selectedWeeks=new Set(wk)}}
            else selectedWeeks.add(w);
          }
        }
        renderWeekTabs();renderAll();
      });
    });
  }

  /* ── Filter GA4 daily data by month/week ── */
  function filterDaily(arr){
    if(!arr) return [];
    return arr.filter(function(r){
      var iso=ga4ToISO(r.date);
      var mo=getMonth(iso);
      if(!selectedMonths.has(mo)) return false;
      if(!isAllWeeks){var ws=getWeekSunday(iso);if(!selectedWeeks.has(ws)) return false;}
      return true;
    });
  }

  /* ── Trend badge ── */
  function trendBadge(cur,prev){
    if(!prev) return '';
    var diff=cur-prev;
    var pctVal=prev?((diff/prev)*100).toFixed(1):'0.0';
    var arrow=diff>=0?'&#9650;':'&#9660;';
    var color=diff>=0?'var(--green)':'var(--pink)';
    return '<b style="color:'+color+'">'+arrow+' '+pctVal+'%</b>';
  }

  /* ── Channel color map ── */
  var CH_COLORS = {
    'Direct':'#f5f5f7','Organic Search':'#30d158','Organic Social':'#ff375f',
    'Paid Search':'#0a84ff','Paid Social':'#bf5af2','Referral':'#ff9f0a',
    'Email':'#ffd60a','Display':'#5ac8fa','Unassigned':'#6e6e73',
    'Cross-network':'#e879f9'
  };
  function chColor(ch){ return CH_COLORS[ch]||'#a1a1a6'; }

  /* ═══════════════════════════════════════════════════════
     LINE CHART
     ═══════════════════════════════════════════════════════ */
  function buildLineChart(labels,datasets,opts){
    opts=opts||{};
    var W=opts.width||900,H=opts.height||300,padL=48,padR=16,padT=24,padB=40;
    var cW=W-padL-padR,cH=H-padT-padB;
    var allVals=[];datasets.forEach(function(ds){ds.data.forEach(function(v){allVals.push(v)})});
    var maxV=Math.max.apply(null,allVals)||1;
    var mag=Math.pow(10,Math.floor(Math.log10(maxV)));
    maxV=Math.ceil(maxV/mag*1.2)*mag;
    var n=labels.length;if(n<2)return'<div style="color:var(--t4);text-align:center;padding:30px">데이터 부족</div>';
    function getX(i){return padL+(i/(n-1))*cW}
    function getY(v){return padT+cH-(v/maxV)*cH}
    function monotonePath(pts){
      if(pts.length<2)return'M'+pts[0].x+','+pts[0].y;
      var N=pts.length,dx=[],dy=[],m=[],tk=[];
      for(var i=0;i<N-1;i++){dx[i]=pts[i+1].x-pts[i].x;dy[i]=pts[i+1].y-pts[i].y;m[i]=dx[i]?dy[i]/dx[i]:0}
      tk[0]=m[0];
      for(var i=1;i<N-1;i++){if(m[i-1]*m[i]<=0)tk[i]=0;else{var a=dx[i-1]+dx[i];tk[i]=3*a/((a+dx[i])/m[i-1]+(a+dx[i-1])/m[i])}}
      tk[N-1]=m[N-2];
      var d='M'+pts[0].x.toFixed(1)+','+pts[0].y.toFixed(1);
      for(var i=0;i<N-1;i++){
        var h=dx[i]/3;
        d+=' C'+(pts[i].x+h).toFixed(1)+','+(pts[i].y+tk[i]*h).toFixed(1)+' '+(pts[i+1].x-h).toFixed(1)+','+(pts[i+1].y-tk[i+1]*h).toFixed(1)+' '+pts[i+1].x.toFixed(1)+','+pts[i+1].y.toFixed(1);
      }
      return d;
    }
    var svg='<svg viewBox="0 0 '+W+' '+H+'" class="line-chart-svg" preserveAspectRatio="xMidYMid meet">';
    svg+='<defs>';
    datasets.forEach(function(ds,di){
      svg+='<filter id="glow_'+ds.id+'" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="'+(di===0?4:3)+'" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
    });
    svg+='</defs>';
    var gs=4,baseY=padT+cH;
    for(var g=1;g<=gs;g++){
      var gv=Math.round(maxV/gs*g),gy=getY(gv);
      svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="rgba(255,255,255,.07)" stroke-width="0.5" stroke-dasharray="3,4"/>';
      var lbl=gv>=1000?(gv/1000).toFixed(1)+'k':gv;
      svg+='<text x="'+(padL-8)+'" y="'+(gy+3)+'" text-anchor="end" fill="rgba(255,255,255,.32)" font-size="9" font-weight="500" font-family="Pretendard,sans-serif">'+lbl+'</text>';
    }
    svg+='<line x1="'+padL+'" y1="'+baseY+'" x2="'+(W-padR)+'" y2="'+baseY+'" stroke="rgba(255,255,255,.08)" stroke-width="0.5"/>';
    var ls=Math.max(1,Math.floor(n/9));
    for(var i=0;i<n;i++){if(i%ls===0||i===n-1)svg+='<text x="'+getX(i)+'" y="'+(H-8)+'" text-anchor="middle" fill="rgba(255,255,255,.35)" font-size="9" font-weight="500" font-family="Pretendard,sans-serif">'+labels[i]+'</text>'}
    var fillCfg=[{top:.20,mid:.06,bot:0},{top:.15,mid:.04,bot:0},{top:.12,mid:.03,bot:0}];
    for(var di=datasets.length-1;di>=0;di--){
      var ds=datasets[di],fc=fillCfg[Math.min(di,fillCfg.length-1)];
      var pts=[];for(var i=0;i<n;i++)pts.push({x:getX(i),y:getY(ds.data[i])});
      var d=monotonePath(pts);
      var areaD=d+' L'+pts[n-1].x+','+baseY+' L'+pts[0].x+','+baseY+' Z';
      svg+='<defs><linearGradient id="ag_'+ds.id+'" x1="0" y1="0" x2="0" y2="1">';
      svg+='<stop offset="0%" stop-color="'+ds.color+'" stop-opacity="'+fc.top+'"/>';
      svg+='<stop offset="50%" stop-color="'+ds.color+'" stop-opacity="'+fc.mid+'"/>';
      svg+='<stop offset="100%" stop-color="'+ds.color+'" stop-opacity="'+fc.bot+'"/>';
      svg+='</linearGradient></defs>';
      svg+='<path d="'+areaD+'" fill="url(#ag_'+ds.id+')" />';
    }
    for(var di=datasets.length-1;di>=0;di--){
      var ds=datasets[di];
      var pts=[];for(var i=0;i<n;i++)pts.push({x:getX(i),y:getY(ds.data[i])});
      var d=monotonePath(pts);
      var sw=di===0?1.5:1;
      var lo=di===0?'.85':'.6';
      svg+='<path d="'+d+'" fill="none" stroke="'+ds.color+'" stroke-width="'+(sw+2)+'" stroke-linecap="round" stroke-linejoin="round" opacity="'+(parseFloat(lo)*.3).toFixed(2)+'" filter="url(#glow_'+ds.id+')"/>';
      svg+='<path d="'+d+'" fill="none" stroke="'+ds.color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round" opacity="'+lo+'"/>';
    }
    var ds0=datasets[0],pts0=[];
    for(var i=0;i<n;i++) pts0.push({x:getX(i),y:getY(ds0.data[i])});
    for(var i=0;i<n;i++){
      var vals='';
      datasets.forEach(function(ds){ vals+=ds.label+': '+ds.data[i].toLocaleString()+'\\n'; });
      svg+='<circle cx="'+pts0[i].x.toFixed(1)+'" cy="'+pts0[i].y.toFixed(1)+'" r="12" fill="transparent" style="cursor:pointer" class="chart-hover-dot" data-idx="'+i+'" data-labels="'+labels[i]+'" data-vals="'+encodeURIComponent(vals)+'"/>';
      svg+='<circle cx="'+pts0[i].x.toFixed(1)+'" cy="'+pts0[i].y.toFixed(1)+'" r="3" fill="'+ds0.color+'" opacity="0" class="chart-dot-visible" data-idx="'+i+'"/>';
    }
    svg+='<line x1="0" y1="'+padT+'" x2="0" y2="'+baseY+'" stroke="rgba(255,255,255,.15)" stroke-width="0.5" stroke-dasharray="3,3" class="chart-hover-line" style="display:none"/>';
    svg+='</svg>';
    var leg='<div class="line-chart-legend">';
    datasets.forEach(function(ds){
      leg+='<div class="line-chart-legend-item"><span class="line-chart-legend-dot" style="background:'+ds.color+'"></span>'+ds.label+'</div>';
    });
    leg+='</div>';
    return '<div class="line-chart-container" style="position:relative">'+svg+leg+'<div class="chart-tooltip" style="display:none;position:absolute;background:rgba(28,28,30,.95);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;font-size:11px;color:#f5f5f7;pointer-events:none;z-index:10;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)"></div></div>';
  }

  /* ═══ DONUT ═══ */
  function buildDonut(segs,centerText){
    var tot=0;segs.forEach(function(s){tot+=s.value});
    if(!tot) return '<div class="no-data">데이터 없음</div>';
    var R=80,r=54,cx=90,cy=90;
    var svg='<svg viewBox="0 0 180 180" class="donut-svg" width="160" height="160">',sa=-90;
    segs.forEach(function(seg){
      var p=seg.value/tot,a=p*360,ea=sa+a,la=a>180?1:0;
      var sr=sa*Math.PI/180,er=ea*Math.PI/180;
      var x1=cx+R*Math.cos(sr),y1=cy+R*Math.sin(sr),x2=cx+R*Math.cos(er),y2=cy+R*Math.sin(er);
      var x3=cx+r*Math.cos(er),y3=cy+r*Math.sin(er),x4=cx+r*Math.cos(sr),y4=cy+r*Math.sin(sr);
      if(segs.length===1){
        svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="'+seg.color+'"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#1d1d1f"/>';
      } else {
        svg+='<path d="M'+x1+','+y1+' A'+R+','+R+' 0 '+la+' 1 '+x2+','+y2+' L'+x3+','+y3+' A'+r+','+r+' 0 '+la+' 0 '+x4+','+y4+' Z" fill="'+seg.color+'" opacity=".85" style="transition:opacity .2s" onmouseover="this.setAttribute(\'opacity\',\'1\')" onmouseout="this.setAttribute(\'opacity\',\'.85\')"/>';
      }
      sa=ea;
    });
    svg+='<text x="'+cx+'" y="'+cy+'" text-anchor="middle" dominant-baseline="central" fill="#f5f5f7" font-size="26" font-weight="700" font-family="Pretendard,sans-serif" letter-spacing="-1">'+(centerText||num(tot))+'</text></svg>';
    var leg='<div class="donut-legend">';
    segs.forEach(function(s){
      var p=Math.round(s.value/tot*100);
      leg+='<div class="donut-legend-item"><span class="donut-legend-dot" style="background:'+s.color+'"></span><span>'+s.label+' <b style="color:var(--t1)">'+num(s.value)+'</b> ('+p+'%)';
      if(s.extra) leg+=' &middot; '+s.extra;
      leg+='</span></div>';
    });
    leg+='</div>';
    return '<div class="donut-wrap">'+svg+leg+'</div>';
  }

  /* ═══════════════════════════════════════════════════════
     RENDER FUNCTIONS
     ═══════════════════════════════════════════════════════ */

  function renderAll(){
    if(!DATA || !DATA.traffic_daily){
      document.getElementById('summaryCards').innerHTML='<div class="hero-kpi"><div class="hero-kpi-tag">GA4 Analytics</div><div style="font-size:24px;color:var(--t4);margin-top:20px">GA4 데이터 없음</div></div>';
      return;
    }
    renderHeroAndTiles();
    renderTrafficTable();
    renderDailyChart();
    renderLandingPages();
    renderDeviceChart();
    renderGeoChart();
    renderNewVsReturning();
    renderPagesTable();
    renderAttributionTable();
    animateCountUp();
  }

  /* ── ERP 매출을 선택된 기간으로 필터 (전체 채널) ── */
  function getFilteredERP(){
    var result={orders:0,rev:0};
    (ERP.orders||[]).forEach(function(o){
      if(o.s!=='sale'&&o.s!=='done') return;
      var mo=getMonth(o.d);
      if(!isAllMode && !selectedMonths.has(mo)) return;
      if(!isAllWeeks){var ws=getWeekSunday(o.d);if(!selectedWeeks.has(ws)) return;}
      result.orders++;
      result.rev+=o.t;
    });
    return result;
  }

  /* ── 1: Hero KPI + Metric Tiles ── */
  function renderHeroAndTiles(){
    var traffic=filterDaily(DATA.traffic_daily);
    var erp=getFilteredERP();

    var totSessions=0,totUsers=0,totNewUsers=0,totEngaged=0,totDuration=0,durationCount=0;
    traffic.forEach(function(r){
      totSessions+=r.sessions||0;
      totUsers+=r.users||0;
      totNewUsers+=r.new_users||0;
      totEngaged+=r.engaged_sessions||0;
      if(r.avg_duration && r.sessions){
        totDuration+=(r.avg_duration||0)*(r.sessions||0);
        durationCount+=r.sessions||0;
      }
    });
    var avgDuration=durationCount?totDuration/durationCount:0;
    var engRate=totSessions?(totEngaged/totSessions*100):0;
    var convRate=totSessions?(erp.orders/totSessions*100):0;

    var h='<div class="hero-kpi">';
    h+='<div class="hero-kpi-tag">Web Analytics · odd.us</div>';
    h+='<div class="hero-kpi-value">'+dollar(erp.rev)+'</div>';
    h+='<div class="hero-kpi-sub">전체 매출 (ERP 기준) &middot; '+erp.orders+'건 &middot; odd.us 전환율 '+pct(convRate)+'</div>';
    h+='</div>';

    h+='<div class="metric-tiles">';
    h+='<div class="m-tile"><div class="m-tile-label">매출</div><div class="m-tile-value" style="color:var(--green)">'+dollar(erp.rev)+'</div><div class="m-tile-sub">ERP 전체 채널</div></div>';
    h+='<div class="m-tile"><div class="m-tile-label">주문</div><div class="m-tile-value" style="color:var(--accent)">'+erp.orders+'건</div><div class="m-tile-sub">전체 주문 건수</div></div>';
    h+='<div class="m-tile"><div class="m-tile-label">전환율</div><div class="m-tile-value" style="color:var(--orange)">'+pct(convRate)+'</div><div class="m-tile-sub">주문 ÷ 세션</div></div>';
    h+='<div class="m-tile"><div class="m-tile-label">세션</div><div class="m-tile-value" style="color:var(--t1)">'+num(totSessions)+'</div><div class="m-tile-sub">GA4 총 세션</div></div>';
    h+='<div class="m-tile"><div class="m-tile-label">사용자</div><div class="m-tile-value" style="color:var(--purple)">'+num(totUsers)+'</div><div class="m-tile-sub">신규 '+num(totNewUsers)+'</div></div>';
    h+='<div class="m-tile"><div class="m-tile-label">참여율</div><div class="m-tile-value" style="color:var(--pink)">'+pct(engRate)+'</div><div class="m-tile-sub">체류 '+fmtDur(avgDuration)+'</div></div>';
    h+='</div>';

    document.getElementById('summaryCards').innerHTML=h;
  }

  /* ── 2: Traffic Acquisition Table (GA4 트래픽 + ERP 매출 매칭) ── */
  function renderTrafficTable(){
    var traffic=filterDaily(DATA.traffic_daily);
    var erp=getFilteredERP();

    // 채널별 세션 + 날짜별 세션 비율로 ERP 매출 배분
    var channels={};
    var dateChannelSessions={}; // date -> {channel -> sessions}
    traffic.forEach(function(r){
      var ch=r.channel||'Unassigned';
      var iso=ga4ToISO(r.date);
      if(!channels[ch]) channels[ch]={sessions:0,users:0,new_users:0,engaged:0,durTotal:0};
      channels[ch].sessions+=r.sessions||0;
      channels[ch].users+=r.users||0;
      channels[ch].new_users+=r.new_users||0;
      channels[ch].engaged+=r.engaged_sessions||0;
      channels[ch].durTotal+=(r.avg_duration||0)*(r.sessions||0);
      if(!dateChannelSessions[iso]) dateChannelSessions[iso]={};
      dateChannelSessions[iso][ch]=(dateChannelSessions[iso][ch]||0)+(r.sessions||0);
    });

    // 날짜별로 ERP 매출을 세션 비율로 채널에 배분
    var channelRev={};
    var channelOrders={};
    Object.keys(dateChannelSessions).forEach(function(date){
      var erpDay=erpByDate[date];
      if(!erpDay) return;
      var dayChs=dateChannelSessions[date];
      var dayTotal=0;
      Object.values(dayChs).forEach(function(s){dayTotal+=s});
      if(!dayTotal) return;
      Object.keys(dayChs).forEach(function(ch){
        var ratio=dayChs[ch]/dayTotal;
        channelRev[ch]=(channelRev[ch]||0)+erpDay.rev*ratio;
        channelOrders[ch]=(channelOrders[ch]||0)+erpDay.orders*ratio;
      });
    });

    var totSess=0;
    Object.values(channels).forEach(function(d){totSess+=d.sessions});

    var sorted=Object.entries(channels).sort(function(a,b){return b[1].sessions-a[1].sessions});
    var h='<table><thead><tr><th>채널 그룹</th><th class="text-right">세션</th><th class="text-right">비중</th><th class="text-right">사용자</th><th class="text-right">추정 매출</th><th class="text-right">추정 전환율</th><th class="text-right">참여율</th><th class="text-right">체류시간</th></tr></thead><tbody>';
    sorted.forEach(function(e){
      var ch=e[0],d=e[1];
      var engRate=d.sessions?(d.engaged/d.sessions*100):0;
      var avgDur=d.sessions?d.durTotal/d.sessions:0;
      var share=totSess?(d.sessions/totSess*100):0;
      var rev=channelRev[ch]||0;
      var orders=channelOrders[ch]||0;
      var convRate=d.sessions?(orders/d.sessions*100):0;
      var co=chColor(ch);
      h+='<tr><td><span class="ch-dot" style="background:'+co+'"></span>'+ch+'</td>';
      h+='<td class="text-right" style="font-weight:600">'+num(d.sessions)+'</td>';
      h+='<td class="text-right" style="color:var(--t3)">'+pct(share)+'</td>';
      h+='<td class="text-right">'+num(d.users)+'</td>';
      h+='<td class="text-right" style="color:var(--green);font-weight:600">'+dollar(Math.round(rev))+'</td>';
      h+='<td class="text-right" style="color:'+(convRate>1?'var(--green)':'var(--t3)')+'">'+pct(convRate)+'</td>';
      h+='<td class="text-right" style="color:'+(engRate>50?'var(--green)':'var(--t3)')+'">'+pct(engRate)+'</td>';
      h+='<td class="text-right" style="color:var(--t3)">'+fmtDur(avgDur)+'</td></tr>';
    });
    h+='</tbody></table>';
    h+='<div style="font-size:11px;color:var(--t5);margin-top:8px">* 추정 매출 = 해당 날짜의 ERP Shopify 매출을 채널 세션 비율로 배분</div>';
    document.getElementById('trafficTable').innerHTML=h;
  }

  /* ── 3: Daily Trend Chart (sessions + ERP revenue) ── */

      {id:'users',label:'Users',data:userData,color:'#30d158'},
      {id:'rev',label:'Revenue ($)',data:revData,color:'#ff9f0a'}

  /* ── Chart hover handler ── */
  document.addEventListener('mousemove',function(e){
    var container=e.target.closest('.line-chart-container');
    if(!container){
      document.querySelectorAll('.line-chart-container').forEach(function(c){
        var tt=c.querySelector('.chart-tooltip');if(tt)tt.style.display='none';
        var ln=c.querySelector('.chart-hover-line');if(ln)ln.style.display='none';
        c.querySelectorAll('.chart-dot-visible').forEach(function(d){d.setAttribute('opacity','0')});
      });
      return;
    }
    var svgEl=container.querySelector('svg');
    if(!svgEl)return;
    var rect=svgEl.getBoundingClientRect();
    var vb=svgEl.getAttribute('viewBox').split(' ');
    var vbW=parseFloat(vb[2]);
    var mouseX=(e.clientX-rect.left)/rect.width*vbW;
    var dots=container.querySelectorAll('.chart-hover-dot');
    var nearest=null,minDist=Infinity;
    dots.forEach(function(d){
      var cx=parseFloat(d.getAttribute('cx'));
      var dist=Math.abs(cx-mouseX);
      if(dist<minDist){minDist=dist;nearest=d}
    });
    container.querySelectorAll('.chart-dot-visible').forEach(function(d){d.setAttribute('opacity','0')});
    var hoverLine=container.querySelector('.chart-hover-line');
    if(hoverLine)hoverLine.style.display='none';
    if(nearest&&minDist<40){
      var idx=nearest.getAttribute('data-idx');
      container.querySelectorAll('.chart-dot-visible[data-idx="'+idx+'"]').forEach(function(d){d.setAttribute('opacity','1')});
      if(hoverLine){var cx=parseFloat(nearest.getAttribute('cx'));hoverLine.setAttribute('x1',cx);hoverLine.setAttribute('x2',cx);hoverLine.style.display='block'}
      var tt=container.querySelector('.chart-tooltip');
      if(tt){
        var lbl=nearest.getAttribute('data-labels');
        var vals=decodeURIComponent(nearest.getAttribute('data-vals')).replace(/\\n/g,'<br>');
        tt.innerHTML='<div style="font-weight:600;margin-bottom:4px;color:var(--accent)">'+lbl+'</div>'+vals;
        var px=(e.clientX-container.getBoundingClientRect().left);
        tt.style.left=Math.min(px+12,container.offsetWidth-160)+'px';
        tt.style.top='10px';
        tt.style.display='block';
      }
    }
  });

  /* ── Count-Up Animation (same as index.html) ── */
  function animateCountUp(){
    var els=document.querySelectorAll('.hero-kpi-value,.m-tile-value');
    els.forEach(function(el){
      var text=el.textContent.trim();
      var match=text.match(/^\$?([\d,]+)/);
      if(!match)return;
      var target=parseInt(match[1].replace(/,/g,''));
      if(isNaN(target)||target===0)return;
      var prefix=text.startsWith('$')?'$':'';
      var suffix=text.replace(/^\$?[\d,]+/,'');
      var duration=900;
      var startTime=null;
      function easeOut(t){return 1-Math.pow(1-t,3)}
      function step(ts){
        if(!startTime)startTime=ts;
        var p=Math.min((ts-startTime)/duration,1);
        var val=Math.round(easeOut(p)*target);
        el.textContent=prefix+val.toLocaleString()+suffix;
        if(p<1)requestAnimationFrame(step);
      }
      el.textContent=prefix+'0'+suffix;
      requestAnimationFrame(step);
    });
  }
